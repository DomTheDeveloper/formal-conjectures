name = "formal_conjectures"
keywords = ["math"]
defaultTargets = ["FormalConjectures", "A263135ScratchAudit"]
testDriver = "FormalConjecturesTest"

[leanOptions]
# Pretty-prints `fun a ↦ b`
pp.unicode.fun = true
# Don't assume a typo is a new variable
autoImplicit = false
relaxedAutoImplicit = false
# our own linters which we don't want to force upon downstream packages
weak.linter.style.copyright.formalConjectures = true
weak.linter.style.namespace = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0"

# We make this a separate library so that we can apply different lean options.
[[lean_lib]]
name = "FormalConjecturesForMathlib"

[[lean_lib]]
name = "FormalConjecturesTest"
[lean_lib.leanOptions]
# Switch off warnings generated by `sorry`
warn.sorry = false

[[lean_lib]]
name = "FormalConjectures"
globs = ["FormalConjectures.+"]
[lean_lib.leanOptions]
# Switch off warnings generated by `sorry`
warn.sorry = false
# our own linters which only make sense for the problems themselves
weak.linter.style.ams_attribute = true
weak.linter.style.category_attribute = true
weak.linter.style.moduleDocstring = true

# Focused temporary library for the complete OEIS A263135 proof workbench.
# Every scratch module is registered explicitly so Lake can build the entire
# transitive chain and produce the final audit object.
[[lean_lib]]
name = "A263135ScratchAudit"
globs = [
  "Scratch.A263135Rows",
  "Scratch.A263135Boundary",
  "Scratch.A263135Endpoints",
  "Scratch.A263135RowBound",
  "Scratch.A263135Staircase",
  "Scratch.A263135Ranks",
  "Scratch.A263135BoxChains",
  "Scratch.A263135ChainMembership",
  "Scratch.A263135ChainOrder",
  "Scratch.A263135ChainCount",
  "Scratch.A263135CapArithmetic",
  "Scratch.A263135Symmetry",
  "Scratch.A263135Incidence",
  "Scratch.A263135Upper",
  "Scratch.A263135Parameters",
  "Scratch.A263135PatchDefs",
  "Scratch.A263135PatchCorners",
  "Scratch.A263135PatchCard",
  "Scratch.A263135PatchStructure",
  "Scratch.A263135PatchContacts",
  "Scratch.A263135ClippingCard",
  "Scratch.A263135ClippingDarts",
  "Scratch.A263135ClippingGeometry",
  "Scratch.A263135RankDarts",
  "Scratch.A263135ClippingContacts",
  "Scratch.A263135Final",
  "Scratch.A263135Audit",
]

# Fork-hosted complete Lean proofs that are linked from upstream metadata.
[[lean_lib]]
name = "WOWII"

[[lean_lib]]
name = "FormalConjecturesAnswerPostpone"
globs = ["FormalConjectures.+"]
[lean_lib.leanOptions]
# Switch off warnings generated by `sorry`
warn.sorry = false
# our own linters which only make sense for the problems themselves
weak.linter.style.ams_attribute = true
weak.linter.style.category_attribute = true
weak.linter.style.moduleDocstring = true
weak.google.answer = "postpone"


[[lean_exe]]
name = "extract_names"
srcDir = "scripts"
root = "extract_names"
exeName = "extract_names"
supportInterpreter = true
