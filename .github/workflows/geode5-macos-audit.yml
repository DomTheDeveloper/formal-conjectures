name: Geode5 macOS exact audit

on:
  push:
    branches: [audit-geode5-crt-proof]
    paths:
      - '.github/workflows/geode5-macos-audit.yml'
      - 'FormalConjectures/Arxiv/2508.10245/Geode5Proof/**'
      - 'FormalConjectures/Arxiv/2508.10245/Geode5.lean'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: geode5-macos-exact
  cancel-in-progress: true

jobs:
  exact-module:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit-geode5-crt-proof
      - name: Reject placeholders in proof modules
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '\b(sorry|admit)\b' FormalConjectures/Arxiv/2508.10245/Geode5Proof; then
            exit 1
          fi
      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build final theorem and audit axioms
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lake build 'FormalConjectures.Arxiv.«2508.10245».Geode5' 2>&1 | tee geode5-macos-audit.log
          cat > Geode5FinalAudit.lean <<'EOF'
          import FormalConjectures.Arxiv.«2508.10245».Geode5
          #print axioms Arxiv.«2508.10245».geode5_1000
          EOF
          lake env lean -DwarningAsError=true Geode5FinalAudit.lean 2>&1 | tee -a geode5-macos-audit.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduceBool|Lean\.ofReduce' geode5-macos-audit.log; then
            exit 1
          fi
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geode5-macos-audit-${{ github.sha }}
          path: geode5-macos-audit.log
          if-no-files-found: warn
      - name: Report exact result on PR 184
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Geode5 macOS final-theorem audit"
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Target: \`FormalConjectures.Arxiv.«2508.10245».Geode5\`"
            echo "Result: **${COMPILE_OUTCOME}**"
            echo
            echo '```text'
            tail -n 160 geode5-macos-audit.log 2>/dev/null || true
            echo '```'
          } > /tmp/geode5-comment.md
          gh pr comment 184 --repo DomTheDeveloper/formal-conjectures --body-file /tmp/geode5-comment.md
      - name: Enforce compiler result
        if: steps.compile.outcome != 'success'
        run: exit 1
