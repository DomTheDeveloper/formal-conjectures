name: BMO8 proof targeted audit

on:
  pull_request:
    branches:
      - bmo8-upstream-base-20260723
    paths:
      - FormalConjectures/Other/BeaverMathOlympiad.lean
      - FormalConjectures/Other/BeaverMathOlympiad8Proof.lean
      - BMO8AuditTrigger.txt
      - .github/workflows/bmo8-pr-audit.yml

permissions:
  contents: read

jobs:
  verify-bmo8:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" exe cache get

      - name: Compile exact BMO8 proof module
        shell: bash
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" env lean FormalConjectures/Other/BeaverMathOlympiad8Proof.lean

      - name: Check theorem axioms
        shell: bash
        run: |
          set -euo pipefail
          cat > BMO8Axioms.lean <<'EOF'
          import FormalConjectures.Other.BeaverMathOlympiad8Proof
          #print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_proof
          EOF
          "$HOME/.elan/bin/lake" env lean BMO8Axioms.lean | tee BMO8Axioms.log
          if grep -q 'sorryAx' BMO8Axioms.log; then
            echo 'Unexpected sorryAx dependency in BMO8 theorem.' >&2
            exit 1
          fi
