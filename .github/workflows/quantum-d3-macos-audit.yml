name: Quantum D3 macOS Lean audit

on:
  push:
    branches:
      - audit/quantum-d3-mod2-2026-07-22
  pull_request:
    branches:
      - audit/upstream-proof-base-2026-07-21
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true
      - name: Compile exact N6 D3 bit-vector theorem
        shell: bash
        run: |
          set -o pipefail
          lake build FormalConjectures.Paper.MonochromaticQuantumGraph
          lake env lean ProofAudit/6_restriction_core.lean 2>&1 | tee quantum-d3-macos.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-d3-macos-audit-log
          path: quantum-d3-macos.log
          if-no-files-found: warn
