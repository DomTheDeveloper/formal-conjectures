name: Apply second A261865 Lean repair batch

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proof branch
        uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          sq = 'FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean'
          replace_once(sq,
              '      a.factorization p + b.factorization p = (a * b).factorization p := by\n'
              '        rw [factorization_mul ha.ne_zero hb.ne_zero]\n'
              '      _ = (c ^ 2).factorization p := by\n'
              '        congr 1\n'
              '        simpa [pow_two] using hc\n',
              '      a.factorization p + b.factorization p = (a * b).factorization p := by\n'
              '        simpa only [Pi.add_apply] using\n'
              '          congrFun (factorization_mul ha.ne_zero hb.ne_zero).symm p\n'
              '      _ = (c ^ 2).factorization p := by\n'
              '        simpa [pow_two, hc]\n')
          replace_once(sq,
              '    norm_num [← Polynomial.C_pow]\n'
              '    rw [Real.sq_sqrt (Nat.cast_nonneg _)]\n'
              '    norm_num\n',
              '    norm_num [← Polynomial.C_pow]\n')

          torus = 'FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean'
          replace_once(torus,
              'lemma integral_mFourier (k : d → ℤ) :\n'
              '    ∫ x : UnitAddTorus d, mFourier k x = if k = 0 then 1 else 0 := by\n'
              '  have h := (orthonormal_iff_ite.mp (orthonormal_mFourier (d := d))) (0 : d → ℤ) k\n'
              '  simpa only [ContinuousMap.inner_toLp, mFourier_zero, ContinuousMap.one_apply,\n'
              '    map_one, one_mul, Pi.zero_apply, neg_zero, zero_add, eq_comm] using h\n',
              'lemma integral_mFourier (k : d → ℤ) :\n'
              '    ∫ x : UnitAddTorus d, mFourier k x = if k = 0 then 1 else 0 := by\n'
              '  rw [volume_eq_fourierVolume (d := d)]\n'
              '  letI : MeasureSpace UnitAddCircle := ⟨AddCircle.haarAddCircle⟩\n'
              '  change (∫ x : UnitAddTorus d, mFourier k x) = if k = 0 then 1 else 0\n'
              '  have h := (orthonormal_iff_ite.mp (orthonormal_mFourier (d := d))) (0 : d → ℤ) k\n'
              '  simpa only [ContinuousMap.inner_toLp, mFourier_zero, ContinuousMap.one_apply,\n'
              '    map_one, one_mul, Pi.zero_apply, neg_zero, zero_add, eq_comm] using h\n')

          Path('.github/workflows/a261865-one-shot-repair-2.yml').unlink()
          PY

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean \
                  FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean \
                  .github/workflows/a261865-one-shot-repair-2.yml
          git commit -m 'Finish A261865 foundation fixes from AXLE diagnostics'
          git push origin HEAD:a261865-research
