name: WOWII focused macOS Lean audit

on:
  pull_request:
    branches:
      - audit/macos-proof-base-v2-2026-07-22

permissions:
  contents: read

jobs:
  audit:
    if: contains(github.event.pull_request.title, 'C160') || contains(github.event.pull_request.title, 'C2')
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true
      - name: Build shared Formal Conjectures utilities
        shell: bash
        run: lake build FormalConjecturesUtil
      - name: Compile C160 helpers and audit axioms
        if: contains(github.event.pull_request.title, 'C160')
        shell: bash
        run: |
          set -o pipefail
          files=(
            ProofAudit/160_attempt.lean
            ProofAudit/160_local_structure.lean
            ProofAudit/160_petals.lean
            ProofAudit/160_local_count.lean
          )
          : > wowii-focused.log
          for file in "${files[@]}"; do
            echo "=== $file ===" | tee -a wowii-focused.log
            lake env lean "$file" 2>&1 | tee -a wowii-focused.log
          done
      - name: Compile C2 counting and local-choice layers
        if: contains(github.event.pull_request.title, 'C2')
        shell: bash
        run: |
          set -o pipefail
          lake env lean ProofAudit/2_counting_core.lean 2>&1 | tee wowii-focused.log
          lake env lean ProofAudit/2_local_choice.lean 2>&1 | tee -a wowii-focused.log
          lake env lean ProofAudit/2_double_count.lean 2>&1 | tee -a wowii-focused.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-focused-macos-audit-log
          path: wowii-focused.log
          if-no-files-found: warn
