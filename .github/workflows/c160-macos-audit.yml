name: C160 macOS Lean audit

on:
  push:
    branches:
      - audit/c160-finish-2026-07-22
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true
      - name: Compile C160 helpers and audit axioms
        shell: bash
        run: |
          set -o pipefail
          lake build FormalConjecturesUtil
          lake env lean ProofAudit/160_attempt.lean 2>&1 | tee c160-macos.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c160-macos-audit-log
          path: c160-macos.log
          if-no-files-found: warn
