name: Audit upstream marker branches

on:
  push:
    branches:
      - automation/prepare-upstream-metadata
    paths:
      - '.github/workflows/audit-upstream-marker-branches.yml'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: upstream/wowii-109-disproved
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture109
          - branch: upstream/wowii-314-solved
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture314
          - branch: upstream/wowii-316-solved
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture316
          - branch: upstream/wowii-322-solved
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture322
          - branch: upstream/bmo4-formal-proof
            target: FormalConjectures.Other.BeaverMathOlympiad
          - branch: upstream/erdos602-countable-proof
            target: FormalConjectures.ErdosProblems.«602»
          - branch: upstream/erdos1150-parseval-proof
            target: FormalConjectures.ErdosProblems.«1150»
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Install Lean
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get >/dev/null

      - name: Build exact upstream-facing module
        shell: bash
        run: lake build '${{ matrix.target }}'
