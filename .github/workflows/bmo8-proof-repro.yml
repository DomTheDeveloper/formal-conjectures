name: BMO8 targeted proof audit

on:
  push:
    branches:
      - agent/bmo8-proof-repro
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get olean cache
        run: |
          lake exe cache get

      - name: Compile BMO8 certificate
        run: |
          lake env lean FormalConjectures/Other/BeaverMathOlympiad8Proof.lean

      - name: Audit theorem axioms
        run: |
          cat > /tmp/BMO8Audit.lean <<'EOF'
          import FormalConjectures.Other.BeaverMathOlympiad8Proof
          #print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_proof
          EOF
          lake env lean /tmp/BMO8Audit.lean | tee /tmp/BMO8Audit.log
          if grep -q 'sorryAx' /tmp/BMO8Audit.log; then
            echo 'Unexpected sorryAx dependency'
            exit 1
          fi
