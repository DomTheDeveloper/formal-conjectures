name: BMO8 targeted proof audit

on:
  push:
    branches:
      - agent/bmo8-proof-repro
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get olean cache
        run: |
          lake exe cache get

      - name: Build BMO8 certificate and preserve diagnostics
        run: |
          set +e
          set -o pipefail
          lake --wfail build FormalConjectures.Other.BeaverMathOlympiad8Proof 2>&1 | tee BMO8Build.log
          echo "${PIPESTATUS[0]}" > BMO8Build.status
          exit 0

      - name: Upload BMO8 build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bmo8-build-diagnostics
          path: |
            BMO8Build.log
            BMO8Build.status

      - name: Enforce compilation success
        run: |
          test "$(cat BMO8Build.status)" = "0"

      - name: Audit theorem axioms
        run: |
          cat > BMO8Audit.lean <<'EOF'
          import FormalConjectures.Other.BeaverMathOlympiad8Proof
          #print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_proof
          EOF
          lake env lean BMO8Audit.lean | tee BMO8Audit.log
          if grep -q 'sorryAx' BMO8Audit.log; then
            echo 'Unexpected sorryAx dependency'
            exit 1
          fi
