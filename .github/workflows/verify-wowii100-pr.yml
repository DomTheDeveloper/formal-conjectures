name: Verify WOWII 100 proof

on:
  pull_request:
    branches:
      - audit/base-wowii-100

concurrency:
  group: wowii100-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Get Mathlib cache
        run: lake exe cache get >/dev/null
      - name: Build proof module
        run: |
          set +e
          lake --wfail build FormalConjectures.WrittenOnTheWallII.GraphConjecture100ForkProof > lean-build.log 2>&1
          status=$?
          tail -n 240 lean-build.log
          exit $status
      - name: Audit theorem axioms
        run: |
          cat > AxiomAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture100ForkProof
          #print axioms WrittenOnTheWallII.GraphConjecture100ForkProof.conjecture100
          EOF
          lake env lean AxiomAudit.lean > axiom-audit.txt 2>&1
          cat axiom-audit.txt
          ! grep -q 'sorryAx' axiom-audit.txt
          ! grep -q 'Lean.trustCompiler' axiom-audit.txt
          ! grep -q 'Lean.ofReduce' axiom-audit.txt
