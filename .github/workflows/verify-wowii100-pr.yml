name: Verify WOWII 100 proof

on:
  pull_request:
    branches:
      - audit/base-wowii-100

concurrency:
  group: wowii100-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore pinned Lean cache
        id: lean-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: wowii100-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
      - name: Get Mathlib cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        run: lake exe cache get >/dev/null
      - name: Save pinned Lean cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: wowii100-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
      - name: Build proof module
        id: build
        continue-on-error: true
        run: |
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture100Complete > lean-build.log 2>&1
      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii100-lean-build-log
          path: lean-build.log
          overwrite: true
      - name: Stop on build failure
        if: steps.build.outcome == 'failure'
        run: |
          tail -n 160 lean-build.log
          exit 1
      - name: Audit theorem axioms
        id: axioms
        continue-on-error: true
        run: |
          cat > AxiomAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture100Complete
          #print axioms WrittenOnTheWallII.GraphConjecture100Complete.conjecture100
          EOF
          lake env lean AxiomAudit.lean > axiom-audit.txt 2>&1
          ! grep -q 'sorryAx' axiom-audit.txt
          ! grep -q 'Lean.trustCompiler' axiom-audit.txt
          ! grep -q 'Lean.ofReduce' axiom-audit.txt
      - name: Upload axiom audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii100-axiom-audit
          path: axiom-audit.txt
          overwrite: true
      - name: Stop on axiom audit failure
        if: steps.axioms.outcome == 'failure'
        run: |
          cat axiom-audit.txt
          exit 1
