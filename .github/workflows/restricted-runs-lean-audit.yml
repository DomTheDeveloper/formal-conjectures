name: Restricted-runs Lean audit

on:
  pull_request:
    branches: [main]
    paths:
      - FormalConjectures/KauersZeilberger/RestrictedRuns.lean
      - .github/workflows/restricted-runs-lean-audit.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile restricted-run tableaux formalization
        run: lake env lean FormalConjectures/KauersZeilberger/RestrictedRuns.lean
