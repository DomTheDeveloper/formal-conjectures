name: Expose Geode5 rational generators

on:
  push:
    branches: [audit-geode5-crt-proof]
    paths:
      - '.github/workflows/geode5-expose-rational-generators.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit-geode5-crt-proof
      - name: Expose qy and qt to recurrence proof modules
        shell: bash
        run: |
          set -euo pipefail
          file=FormalConjectures/Arxiv/2508.10245/Geode5Proof/Recurrence.lean
          sed -i 's/^private def qy /def qy /' "$file"
          sed -i 's/^private def qt /def qt /' "$file"
          rm .github/workflows/geode5-expose-rational-generators.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "$file" .github/workflows/geode5-expose-rational-generators.yml
          git commit -m 'Expose Geode5 rational polynomial generators [skip ci]'
          git push origin HEAD:audit-geode5-crt-proof
