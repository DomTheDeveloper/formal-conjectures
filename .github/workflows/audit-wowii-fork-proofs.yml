name: Audit merged WOWII fork proofs

on:
  push:
    branches:
      - audit/wowii-fork-proof-main
  pull_request:
    paths:
      - '.github/workflows/audit-wowii-fork-proofs.yml'
      - 'WOWII/**'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture143ForkProof.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture316ForkProof.lean'
      - 'lakefile.toml'

permissions:
  contents: read

concurrency:
  group: wowii-fork-proof-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Lean
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get >/dev/null

      - name: Reject explicit proof holes and custom axioms
        shell: bash
        run: |
          if grep -RInE '^[[:space:]]*(sorry|admit|axiom)([[:space:]]|$)' \
              WOWII \
              FormalConjectures/WrittenOnTheWallII/GraphConjecture143ForkProof.lean \
              FormalConjectures/WrittenOnTheWallII/GraphConjecture316ForkProof.lean; then
            echo "Explicit proof hole or custom axiom found"
            exit 1
          fi

      - name: Compile exact fork proof wrappers
        shell: bash
        run: |
          lake build \
            FormalConjectures.WrittenOnTheWallII.GraphConjecture143ForkProof \
            FormalConjectures.WrittenOnTheWallII.GraphConjecture316ForkProof

      - name: Audit exact theorem axioms
        shell: bash
        run: |
          cat > WOWIIForkProofAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture143ForkProof
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture316ForkProof
          #check WrittenOnTheWallII.GraphConjecture143.conjecture143_fork_proof
          #print axioms WrittenOnTheWallII.GraphConjecture143.conjecture143_fork_proof
          #check WrittenOnTheWallII.GraphConjecture316.conjecture316_fork_proof
          #print axioms WrittenOnTheWallII.GraphConjecture316.conjecture316_fork_proof
          EOF
          lake env lean WOWIIForkProofAudit.lean 2>&1 | tee wowii-fork-proof-audit.log
          if grep -E 'sorryAx|admitAx|Lean\.trustCompiler|Lean\.ofReduceBool' wowii-fork-proof-audit.log; then
            echo "Unexpected non-kernel axiom detected"
            exit 1
          fi

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-fork-proof-audit
          path: wowii-fork-proof-audit.log
          if-no-files-found: warn
