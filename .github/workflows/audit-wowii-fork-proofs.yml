name: Audit merged upstream candidates

on:
  push:
    branches:
      - audit/wowii-fork-proof-main

permissions:
  contents: read

concurrency:
  group: merged-upstream-candidates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - label: wowii65
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture65
            module: FormalConjectures.WrittenOnTheWallII.GraphConjecture65
            theorem: WrittenOnTheWallII.GraphConjecture65.conjecture65
          - label: wowii109
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture109
            module: FormalConjectures.WrittenOnTheWallII.GraphConjecture109
            theorem: WrittenOnTheWallII.GraphConjecture109.conjecture109
          - label: wowii143
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture143ForkProof
            module: FormalConjectures.WrittenOnTheWallII.GraphConjecture143ForkProof
            theorem: WrittenOnTheWallII.GraphConjecture143.conjecture143_fork_proof
          - label: wowii314
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture314
            module: FormalConjectures.WrittenOnTheWallII.GraphConjecture314
            theorem: WrittenOnTheWallII.GraphConjecture314.conjecture314
          - label: wowii316
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture316ForkProof
            module: FormalConjectures.WrittenOnTheWallII.GraphConjecture316ForkProof
            theorem: WrittenOnTheWallII.GraphConjecture316.conjecture316_fork_proof
          - label: wowii322
            target: FormalConjectures.WrittenOnTheWallII.GraphConjecture322
            module: FormalConjectures.WrittenOnTheWallII.GraphConjecture322
            theorem: WrittenOnTheWallII.GraphConjecture322.conjecture322
          - label: bmo4
            target: FormalConjectures.Other.BeaverMathOlympiad
            module: FormalConjectures.Other.BeaverMathOlympiad
            theorem: BeaverMathOlympiad.beaver_math_olympiad_problem_4
          - label: erdos602
            target: FormalConjectures.ErdosProblems.Erdos602Countable
            module: FormalConjectures.ErdosProblems.Erdos602Countable
            theorem: Erdos602.countable_index_proof
          - label: erdos1150
            target: FormalConjectures.ErdosProblems.Erdos1150Parseval
            module: FormalConjectures.ErdosProblems.Erdos1150Parseval
            theorem: Erdos1150Parseval.parseval_lower_bound
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Lean
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get >/dev/null

      - name: Build exact candidate module
        shell: bash
        run: lake build '${{ matrix.target }}'

      - name: Audit exact theorem axioms
        shell: bash
        env:
          MODULE: ${{ matrix.module }}
          THEOREM: ${{ matrix.theorem }}
          LABEL: ${{ matrix.label }}
        run: |
          printf 'import %s\n#print axioms %s\n' "$MODULE" "$THEOREM" > "Audit-${LABEL}.lean"
          lake env lean "Audit-${LABEL}.lean" 2>&1 | tee "audit-${LABEL}.log"
          if grep -E 'sorryAx|admitAx|Lean\.trustCompiler|Lean\.ofReduceBool' "audit-${LABEL}.log"; then
            echo "Unexpected non-kernel axiom detected"
            exit 1
          fi

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-candidate-${{ matrix.label }}-audit
          path: audit-${{ matrix.label }}.log
          if-no-files-found: warn
