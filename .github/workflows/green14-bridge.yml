name: Green14 finite bridge diagnostics

on:
  push:
    branches:
      - agent/green14-certificates-20-39
    paths:
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/green14-bridge.yml'
  pull_request:
    paths:
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/green14-bridge.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: green14-bridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Apply final arithmetic normalization patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("FormalConjectures/GreensOpenProblems/Green14FiniteExistence.lean")
          text = path.read_text()
          old = """          refine ⟨⟨n, hnq⟩, ?_⟩
          simp [value, Nat.mul_comm, Nat.add_comm, Nat.add_left_comm]
"""
          new = """          refine ⟨⟨n, hnq⟩, ?_⟩
          change a * n + b + 1 = b + 1 + n * a
          rw [Nat.mul_comm n a]
          omega
"""
          if text.count(old) != 1:
              raise SystemExit("expected exactly one Green14 normalization site")
          path.write_text(text.replace(old, new))
          PY
      - name: Compile complete certificate chain
        shell: bash
        run: |
          set -euo pipefail
          : > green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14Core 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14FiniteExistence 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14OrderBridge 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14Certificates 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14CertificateBridge 2>&1 | tee -a green14.log
      - name: Audit all twenty exact numerical theorem heads
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/Green14Axioms.lean <<'EOF'
          import FormalConjectures.GreensOpenProblems.Green14CertificateBridge
          #print axioms Green14.mixedMonoAPGuaranteeSet_nonempty
          #print axioms Green14.mixedMonoAPGuaranteeSet_upward
          #print axioms Green14.W_ge_succ_of_not_mem
          #print axioms Green14.CertificateBridge.W_3_20_lower_proved
          #print axioms Green14.CertificateBridge.W_3_21_lower_proved
          #print axioms Green14.CertificateBridge.W_3_22_lower_proved
          #print axioms Green14.CertificateBridge.W_3_23_lower_proved
          #print axioms Green14.CertificateBridge.W_3_24_lower_proved
          #print axioms Green14.CertificateBridge.W_3_25_lower_proved
          #print axioms Green14.CertificateBridge.W_3_26_lower_proved
          #print axioms Green14.CertificateBridge.W_3_27_lower_proved
          #print axioms Green14.CertificateBridge.W_3_28_lower_proved
          #print axioms Green14.CertificateBridge.W_3_29_lower_proved
          #print axioms Green14.CertificateBridge.W_3_30_lower_proved
          #print axioms Green14.CertificateBridge.W_3_31_lower_proved
          #print axioms Green14.CertificateBridge.W_3_32_lower_proved
          #print axioms Green14.CertificateBridge.W_3_33_lower_proved
          #print axioms Green14.CertificateBridge.W_3_34_lower_proved
          #print axioms Green14.CertificateBridge.W_3_35_lower_proved
          #print axioms Green14.CertificateBridge.W_3_36_lower_proved
          #print axioms Green14.CertificateBridge.W_3_37_lower_proved
          #print axioms Green14.CertificateBridge.W_3_38_lower_proved
          #print axioms Green14.CertificateBridge.W_3_39_lower_proved
          EOF
          lake env lean /tmp/Green14Axioms.lean 2>&1 | tee -a green14.log
          if grep -q sorryAx green14.log; then
            exit 1
          fi
      - name: Reject bridge placeholders
        shell: bash
        run: |
          if grep -nE 'theorem W_3_(2[0-9]|3[0-9])_lower_proved.*:= sorry' \
              FormalConjectures/GreensOpenProblems/Green14CertificateBridge.lean; then
            exit 1
          fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: green14-bridge-log
          path: green14.log
          if-no-files-found: warn
