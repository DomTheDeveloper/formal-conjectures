name: Green14 finite bridge diagnostics

on:
  push:
    branches:
      - agent/green14-certificates-20-39
    paths:
      - 'FormalConjectures/GreensOpenProblems/14.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/green14-bridge.yml'
  pull_request:
    paths:
      - 'FormalConjectures/GreensOpenProblems/14.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/green14-bridge.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: green14-bridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Compile complete certificate and catalog chain
        shell: bash
        run: |
          set -o pipefail
          : > green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14Core 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14FiniteExistence 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14OrderBridge 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14Certificates 2>&1 | tee -a green14.log
          lake build FormalConjectures.GreensOpenProblems.Green14CertificateBridge 2>&1 | tee -a green14.log
          lake build 'FormalConjectures.GreensOpenProblems.«14»' 2>&1 | tee -a green14.log
      - name: Audit exact catalog theorem axioms
        shell: bash
        run: |
          cat > /tmp/Green14Axioms.lean <<'EOF'
          import FormalConjectures.GreensOpenProblems.«14»
          #print axioms Green14.mixedMonoAPGuaranteeSet_nonempty
          #print axioms Green14.mixedMonoAPGuaranteeSet_upward
          #print axioms Green14.W_ge_succ_of_not_mem
          #print axioms Green14.CertificateBridge.W_3_20_lower_proved
          #print axioms Green14.CertificateBridge.W_3_39_lower_proved
          #print axioms Green14.W_3_20_lower
          #print axioms Green14.W_3_39_lower
          EOF
          lake env lean /tmp/Green14Axioms.lean 2>&1 | tee -a green14.log
          if grep -q sorryAx green14.log; then
            exit 1
          fi
      - name: Reject lower-bound placeholders
        shell: bash
        run: |
          if grep -nE 'theorem W_3_(2[0-9]|3[0-9])_lower.*:= sorry' \
              FormalConjectures/GreensOpenProblems/14.lean; then
            exit 1
          fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: green14-bridge-log
          path: green14.log
          if-no-files-found: warn
