name: Repair A261865 base arithmetic and terminal-box nonnegativity

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-9.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              n = text.count(old)
              if n != 1:
                  raise SystemExit(f'{path}: expected one match, found {n}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          base = 'FormalConjectures/OEIS/A261865Base.lean'
          replace_once(base,
              '    have hmcast : (m : ℝ) = (⌊x⌋ : ℝ) + 1 := by\n'
              '      simp [m, Int.toNat_of_nonneg hfloor_nonneg]\n',
              '    have hmcast : (m : ℝ) = (⌊x⌋ : ℝ) + 1 := by\n'
              '      norm_num [m]\n'
              '      exact_mod_cast Int.toNat_of_nonneg hfloor_nonneg\n')

          replace_once(base,
              '  have hmn : m < n + 1 := by\n'
              '    exact_mod_cast (by simpa [Nat.cast_add, Nat.cast_one] using hright)\n'
              '  omega\n',
              '  have hright\' : (m : ℝ) < (n : ℝ) + 1 := by simpa using hright\n'
              '  have hmn : m ≤ n := by\n'
              '    exact_mod_cast hright\'\n'
              '  omega\n')

          replace_once(base,
              '  refine ⟨m * c, Nat.mul_pos hm hc, ?_, ?_⟩\n'
              '  · simpa only [hsqrt, Nat.cast_mul, mul_assoc] using hleft\n'
              '  · simpa only [hsqrt, Nat.cast_mul, mul_assoc] using hright\n',
              '  refine ⟨m * c, Nat.mul_pos hm hc, ?_, ?_⟩\n'
              '  · calc\n'
              '      (n : ℝ) < (m : ℝ) * ((c : ℝ) * Real.sqrt (s : ℝ)) := by\n'
              '        rw [← hsqrt]\n'
              '        exact hleft\n'
              '      _ = ((m * c : ℕ) : ℝ) * Real.sqrt (s : ℝ) := by\n'
              '        push_cast\n'
              '        ring\n'
              '  · calc\n'
              '      ((m * c : ℕ) : ℝ) * Real.sqrt (s : ℝ) =\n'
              '          (m : ℝ) * ((c : ℝ) * Real.sqrt (s : ℝ)) := by\n'
              '            push_cast\n'
              '            ring\n'
              '      _ < (n : ℝ) + 1 := by\n'
              '        rw [← hsqrt]\n'
              '        exact hright\n')

          replace_once(base,
              '          have hspos : 0 < s := by\n'
              '            rw [hrs] at hr\n'
              '            positivity\n'
              '          have hslt : s < r := by\n'
              '            rw [hrs]\n'
              '            nlinarith [hdprime.two_le]\n',
              '          have hspos : 0 < s := by\n'
              '            apply Nat.pos_of_ne_zero\n'
              '            intro hs0\n'
              '            subst s\n'
              '            simp at hr\n'
              '          have hslt : s < r := by\n'
              '            rw [hrs]\n'
              '            have hdd : 1 < d * d := by nlinarith [hdprime.two_le]\n'
              '            simpa using Nat.mul_lt_mul_of_pos_right hdd hspos\n')

          box = 'FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean'
          replace_once(box,
              '  rw [volume_terminalBox j a ha0 ha1, ENNReal.toReal_ofReal]\n'
              '  positivity\n',
              '  have hnonneg : 0 ≤ a j * ∏ i ∈ Finset.univ.erase j, (1 - a i) := by\n'
              '    apply mul_nonneg (ha0 j).le\n'
              '    apply Finset.prod_nonneg\n'
              '    intro i hi\n'
              '    exact sub_nonneg.mpr (ha1 i).le\n'
              '  rw [volume_terminalBox j a ha0 ha1, ENNReal.toReal_ofReal hnonneg]\n')

          Path('.github/workflows/a261865-one-shot-repair-9.yml').unlink()
          PY

      - name: Commit repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjectures/OEIS/A261865Base.lean \
                  FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean \
                  .github/workflows/a261865-one-shot-repair-9.yml
          git commit -m 'Fix A261865 base casts and terminal-box nonnegativity'
          git push origin HEAD:a261865-research
