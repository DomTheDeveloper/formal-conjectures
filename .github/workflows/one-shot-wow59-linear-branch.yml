# Synchronization trigger for the current WOWII 59 source.

name: One-shot WOWII59 branched omega certificate

on:
  push:
    paths:
      - '.github/workflows/one-shot-wow59-linear-branch.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/solve-wowii-59
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add explicit integral branching
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('Scratch/WOWII59CycleBridgeTest.lean')
          text = p.read_text()
          pattern = r'(private theorem cycle_cover_linear[\s\S]*?\(h25 : x0 \+ x5 \+ x4 \+ x9 ≤ 3\) :\n[\s\S]*?≤ 13 := by\n)  omega\n\n(private theorem cycle_cover)'
          replacement = r'''\1  interval_cases x0 <;>
    interval_cases x1 <;>
    interval_cases x3 <;>
    interval_cases x5 <;>
    interval_cases x6 <;>
    interval_cases x9 <;>
    interval_cases x10 <;>
    omega

\2'''
          new, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'linear theorem target count={count}')
          p.write_text(new)
          PY

      - name: Install repository-pinned Lean
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore pinned Mathlib cache
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" exe cache get

      - name: Compile symbolic cycle-cover bridge
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" env lean Scratch/WOWII59CycleBridgeTest.lean

      - name: Commit verified certificate
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email 'proof-orchestrator@users.noreply.github.com'
          git add Scratch/WOWII59CycleBridgeTest.lean
          git diff --cached --check
          git commit -m 'Make WOWII 59 cycle certificate branch-explicit'
          git push origin HEAD:agent/solve-wowii-59
