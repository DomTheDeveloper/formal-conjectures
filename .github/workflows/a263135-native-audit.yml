name: OEIS A263135 native Lean audit

on:
  push:
    branches: [audit/a263135-native]
    paths:
      - '.github/workflows/a263135-native-audit.yml'
      - 'audits/A263135_TRIGGER'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: a263135-native-dtd
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout audit harness
        uses: actions/checkout@v6
        with:
          path: audit-harness

      - name: Checkout live A263135 proof branch
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: agent/solve-oeis-a263135
          path: formal-conjectures

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean build cache
        id: lean-build-cache
        uses: actions/cache/restore@v4
        with:
          path: formal-conjectures/.lake/build
          key: a263135-dtd-lean427-v2-${{ hashFiles('formal-conjectures/lean-toolchain', 'formal-conjectures/lake-manifest.json') }}

      - name: Fetch pinned Mathlib cache
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get

      - name: Reject proof shortcuts
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          files=$(find Scratch -maxdepth 1 -type f -name 'A263135*.lean' -print)
          if grep -nE '\b(sorry|admit|native_decide|unsafe|axiom)\b|Lean\.(trustCompiler|ofReduce|ofReduceBool)' $files; then
            echo 'Forbidden proof shortcut found.' >&2
            exit 1
          fi

      - name: Register complete A263135 module graph
        working-directory: formal-conjectures
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          lakefile = Path('lakefile.toml')
          text = lakefile.read_text()
          modules = sorted(
              'Scratch.' + path.stem
              for path in Path('Scratch').glob('A263135*.lean')
          )
          old = 'globs = ["Scratch.A263135Audit"]'
          if old not in text:
              raise SystemExit('focused A263135 library declaration not found')
          lakefile.write_text(text.replace(old, 'globs = ' + json.dumps(modules), 1))
          print(f'Registered {len(modules)} A263135 modules')
          PY

      - name: Build theorem and capture status
        working-directory: formal-conjectures
        shell: bash
        run: |
          set +e
          lake build A263135ScratchAudit 2>&1 | tee "$RUNNER_TEMP/a263135-native.log"
          status=${PIPESTATUS[0]}
          if grep -E 'sorryAx|Lean\.(trustCompiler|ofReduce|ofReduceBool)' "$RUNNER_TEMP/a263135-native.log"; then
            status=2
            echo 'Unacceptable axiom dependency found.' | tee -a "$RUNNER_TEMP/a263135-native.log"
          fi
          echo "A263135_BUILD_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Save Lean build cache
        if: always() && steps.lean-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: formal-conjectures/.lake/build
          key: a263135-dtd-lean427-v2-${{ hashFiles('formal-conjectures/lean-toolchain', 'formal-conjectures/lake-manifest.json') }}

      - name: Publish exact audit transcript
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-harness/audits
          proof_sha=$(git -C formal-conjectures rev-parse HEAD)
          {
            echo "Proof commit: $proof_sha"
            echo "Build status: ${A263135_BUILD_STATUS:-setup-failed}"
            echo
            cat "$RUNNER_TEMP/a263135-native.log" 2>/dev/null || true
          } > audit-harness/audits/A263135_NATIVE.log
          cd audit-harness
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audits/A263135_NATIVE.log
          if ! git diff --cached --quiet; then
            git commit -m "audit(A263135): publish native Lean transcript"
            git push origin HEAD:audit/a263135-native
          fi

      - name: Enforce audit result
        if: always()
        shell: bash
        run: |
          test "${A263135_BUILD_STATUS:-1}" -eq 0
