name: Check WOWII 146 proof

on:
  pull_request:
    paths:
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture146Proof.lean'
      - '.github/wowii146-source.part*'
      - '.github/workflows/check-wowii146.yml'

permissions:
  contents: read

jobs:
  check-wowii146:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Restore mathlib cache
        uses: actions/cache/restore@v3
        with:
          path: ~/.cache/mathlib
          key: wowii146-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('.github/wowii146-source.part*') }}
          restore-keys: |
            oleans-${{ hashFiles('lake-manifest.json') }}-
            oleans-

      - name: Get olean cache
        run: |
          lake exe cache unpack
          lake exe cache get

      - name: Assemble exact proof source
        run: |
          cat .github/wowii146-source.part* > FormalConjectures/WrittenOnTheWallII/GraphConjecture146Proof.lean
          wc -c FormalConjectures/WrittenOnTheWallII/GraphConjecture146Proof.lean
          sha256sum FormalConjectures/WrittenOnTheWallII/GraphConjecture146Proof.lean | tee wowii146-source.sha256

      - name: Compile exact proof module
        run: |
          set +e
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture146Proof > wowii146.log 2>&1
          status=$?
          cat wowii146.log
          printf '%s\n' "$status" > wowii146.status
          exit "$status"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii146-diagnostics
          path: |
            wowii146-source.sha256
            wowii146.log
            wowii146.status
          if-no-files-found: warn
