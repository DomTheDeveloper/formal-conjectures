name: Verify WOWII 100 metadata

on:
  pull_request:
    branches:
      - audit/base-wowii-100-metadata

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore pinned Lean cache
        id: lean-cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: wowii100-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
      - name: Get Mathlib cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        run: lake exe cache get >/dev/null
      - name: Build target with warnings as errors
        run: lake --wfail build FormalConjectures.WrittenOnTheWallII.GraphConjecture100
