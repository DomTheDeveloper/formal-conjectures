name: C217 isolated diagnostic

on:
  push:
    branches:
      - agent/c217-finish

permissions:
  contents: write

jobs:
  enumerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/c217-finish
      - name: Enumerate exact low-degree remainder
        run: |
          set -euxo pipefail
          mkdir -p C217
          python3 scripts/c217_enumerate_sequences.py > C217/generated_low_delta_sequences.md
          cat C217/generated_low_delta_sequences.md
      - name: Commit deterministic output
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add C217/generated_low_delta_sequences.md
          git diff --cached --quiet && exit 0
          git commit -m 'chore(C217): record exact low-degree remainder'
          git push origin HEAD:agent/c217-finish
