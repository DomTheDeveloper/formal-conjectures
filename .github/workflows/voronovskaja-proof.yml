name: Voronovskaja proof verification

on:
  push:
    branches:
      - solve-voronovskaja-no-sorry
  pull_request:
    paths:
      - 'FormalConjectures/Paper/VoronovskajaTypeFormula.lean'
      - 'FormalConjectures/Paper/VoronovskajaProof.lean'
      - 'FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean'
      - '.github/workflows/voronovskaja-proof.yml'
  workflow_dispatch:

concurrency:
  group: voronovskaja-proof
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore mathlib cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/mathlib
          key: voronovskaja-arm-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            voronovskaja-arm-

      - name: Fetch precompiled dependencies
        run: |
          lake exe cache get >/dev/null

      # Focused compatibility build: Taylor expansion, Levy convergence, CLT, then the target proof.
      - name: Verify proof module
        id: lean
        shell: bash
        run: |
          set +e
          lake build FormalConjectures.Paper.VoronovskajaProof > /tmp/lean.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 220 /tmp/lean.log
          exit 0

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-lean-log
          path: /tmp/lean.log

      - name: Fail when Lean fails
        if: steps.lean.outputs.status != '0'
        run: exit 1
