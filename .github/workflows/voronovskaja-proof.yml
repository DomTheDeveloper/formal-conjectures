name: Voronovskaja proof verification

on:
  push:
    branches:
      - solve-voronovskaja-no-sorry
    paths:
      - 'FormalConjectures/Paper/Voronovskaja*.lean'
      - 'FormalConjecturesForMathlib/Probability/**'
      - '.github/voronovskaja_migrate*.py'
      - '.github/workflows/voronovskaja-proof.yml'
  pull_request:
    paths:
      - 'FormalConjectures/Paper/Voronovskaja*.lean'
      - 'FormalConjecturesForMathlib/Probability/**'
      - '.github/voronovskaja_migrate*.py'
      - '.github/workflows/voronovskaja-proof.yml'
  workflow_dispatch:

concurrency:
  group: voronovskaja-proof-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: kernel-verify
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lean dependency cache
        uses: actions/cache/restore@v3
        with:
          path: ~/.cache/mathlib
          key: voronovskaja-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lake-manifest.json') }}
      - name: Fetch precompiled dependencies
        run: lake exe cache get
      - name: Apply migration candidate
        run: |
          python3 .github/voronovskaja_migrate.py
          python3 .github/voronovskaja_migrate_round2.py
          python3 .github/voronovskaja_migrate_round5.py
      - name: Reject placeholders in proof sources
        shell: bash
        run: |
          set -o pipefail
          if grep -R -nE '(^|[^[:alnum:]_])(sorry|admit)([^[:alnum:]_]|$)|^[[:space:]]*axiom[[:space:]]' \
              FormalConjectures/Paper/Voronovskaja*.lean \
              FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean \
              FormalConjecturesForMathlib/Probability/CDFConvergence.lean \
              FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean \
              FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean \
              FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial*.lean \
              FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean \
              FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomial*.lean; then
            exit 1
          fi
      - name: Compile exact theorem and dependencies
        shell: bash
        run: |
          set -o pipefail
          lake build FormalConjectures.Paper.VoronovskajaTypeFormula 2>&1 | tee /tmp/lean.log
      - name: Kernel axiom audit
        shell: bash
        run: |
          cat > /tmp/VoronovskajaAxioms.lean <<'EOF'
          import FormalConjectures.Paper.VoronovskajaTypeFormula
          #print axioms VoronovskajaTypeFormula.voronovskaja_theorem.bernstein_operators
          #print axioms VoronovskajaTypeFormula.voronovskaja_theorem.bezier_bernstein_operators
          #print axioms VoronovskajaTypeFormula.tendsto_bezierBernstein_all
          #print axioms VoronovskajaTypeFormula.tendsto_classical_bezierBernstein_all
          EOF
          lake env lean /tmp/VoronovskajaAxioms.lean | tee -a /tmp/lean.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' /tmp/lean.log; then
            echo 'Disallowed axiom detected.' >&2
            exit 1
          fi
      - name: Upload diagnostics and patched source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-kernel-verification-log
          path: |
            /tmp/lean.log
            FormalConjectures/Paper/VoronovskajaProof.lean
            FormalConjectures/Paper/VoronovskajaDiscreteLaw.lean
            FormalConjectures/Paper/VoronovskajaExpectation.lean
            FormalConjectures/Paper/VoronovskajaMomentLimit.lean
            FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialMoments.lean
            FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialSecondMoment.lean
            FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialTailIntegrability.lean
          if-no-files-found: warn
