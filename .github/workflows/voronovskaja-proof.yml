name: Voronovskaja proof verification

on:
  push:
    branches:
      - solve-voronovskaja-no-sorry
  pull_request:
    paths:
      - 'FormalConjectures/Paper/VoronovskajaTypeFormula.lean'
      - 'FormalConjectures/Paper/VoronovskajaCounterexample.lean'
      - '.github/workflows/voronovskaja-proof.yml'
  workflow_dispatch:

concurrency:
  group: voronovskaja-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore mathlib cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/mathlib
          key: voronovskaja-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            voronovskaja-
            oleans-

      - name: Fetch precompiled dependencies
        run: |
          lake exe cache get >/dev/null

      - name: Verify counterexample module
        id: lean
        shell: bash
        run: |
          set +e
          : > /tmp/lean.log
          lake env lean -o FormalConjectures/Paper/VoronovskajaTypeFormula.olean \
            FormalConjectures/Paper/VoronovskajaTypeFormula.lean >> /tmp/lean.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            lake env lean FormalConjectures/Paper/VoronovskajaCounterexample.lean >> /tmp/lean.log 2>&1
            status=$?
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 160 /tmp/lean.log
          exit 0

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-lean-log
          path: /tmp/lean.log

      - name: Fail when Lean fails
        if: steps.lean.outputs.status != '0'
        run: exit 1
