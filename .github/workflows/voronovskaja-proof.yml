name: Voronovskaja proof verification

on:
  pull_request:
    paths:
      - 'FormalConjectures/Paper/Voronovskaja*.lean'
      - 'FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean'
      - 'FormalConjecturesForMathlib/Probability/CDFConvergence.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial*.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomial*.lean'
      - 'FormalConjecturesForMathlib/Order/Filter/ENNReal.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean'
      - '.github/workflows/voronovskaja-proof.yml'
  workflow_dispatch:

concurrency:
  group: voronovskaja-proof-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean dependency cache
        uses: actions/cache/restore@v3
        with:
          path: ~/.cache/mathlib
          key: voronovskaja-x64-${{ hashFiles('lake-manifest.json') }}

      - name: Fetch precompiled dependencies
        run: lake exe cache get

      - name: Reject placeholders in proof sources
        shell: bash
        run: |
          set -o pipefail
          if grep -R -nE '(^|[^[:alnum:]_])(sorry|admit)([^[:alnum:]_]|$)|^[[:space:]]*axiom[[:space:]]' \
              FormalConjectures/Paper/Voronovskaja*.lean \
              FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean \
              FormalConjecturesForMathlib/Probability/CDFConvergence.lean \
              FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean \
              FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean \
              FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial*.lean \
              FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean \
              FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomial*.lean \
              FormalConjecturesForMathlib/Order/Filter/ENNReal.lean \
              FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean \
              FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean; then
            exit 1
          fi

      - name: Compile complete proof chain
        shell: bash
        run: |
          set -o pipefail
          lake build \
            Mathlib.Order.Interval.Set.Nat \
            FormalConjecturesForMathlib.MeasureTheory.Measure.CharacteristicFunction.TaylorExpansion \
            FormalConjecturesForMathlib.Order.Filter.ENNReal \
            FormalConjecturesForMathlib.MeasureTheory.Measure.LevyConvergence \
            FormalConjecturesForMathlib.Probability.CentralLimitTheorem \
            FormalConjecturesForMathlib.Probability.Distributions.Bernoulli \
            FormalConjecturesForMathlib.Probability.Distributions.Binomial \
            FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomial \
            FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomialTails \
            FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomialMGF \
            FormalConjecturesForMathlib.Probability.CDFConvergence \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredGaussian \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialLimit \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialTails \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialMoments \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialTailIntegrability \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialSecondMoment \
            FormalConjectures.Paper.VoronovskajaDefinitions \
            FormalConjectures.Paper.VoronovskajaProof \
            FormalConjectures.Paper.VoronovskajaAffine \
            FormalConjectures.Paper.VoronovskajaEndpoints \
            FormalConjectures.Paper.VoronovskajaDiscreteLaw \
            FormalConjectures.Paper.VoronovskajaExpectation \
            FormalConjectures.Paper.VoronovskajaMomentLimit \
            FormalConjectures.Paper.VoronovskajaSecondMomentExpectation \
            FormalConjectures.Paper.VoronovskajaSecondMoment \
            FormalConjectures.Paper.VoronovskajaTaylorBound \
            FormalConjectures.Paper.VoronovskajaRemainder \
            FormalConjectures.Paper.VoronovskajaMain \
            FormalConjectures.Paper.VoronovskajaClassicalMoments \
            FormalConjectures.Paper.VoronovskajaClassicalTaylor \
            FormalConjectures.Paper.VoronovskajaClassicalConcentration \
            FormalConjectures.Paper.VoronovskajaClassicalRemainder \
            FormalConjectures.Paper.VoronovskajaClassicalMain \
            FormalConjectures.Paper.VoronovskajaTypeFormula \
            2>&1 | tee /tmp/lean.log

      - name: Axiom audit
        shell: bash
        run: |
          cat > /tmp/VoronovskajaAxioms.lean <<'EOF'
          import FormalConjectures.Paper.VoronovskajaTypeFormula
          #print axioms VoronovskajaTypeFormula.voronovskaja_theorem.bernstein_operators
          #print axioms VoronovskajaTypeFormula.voronovskaja_theorem.bezier_bernstein_operators
          #print axioms VoronovskajaTypeFormula.tendsto_bezierBernstein_all
          #print axioms VoronovskajaTypeFormula.tendsto_classical_bezierBernstein_all
          EOF
          lake env lean /tmp/VoronovskajaAxioms.lean | tee -a /tmp/lean.log

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-lean-log
          path: /tmp/lean.log
