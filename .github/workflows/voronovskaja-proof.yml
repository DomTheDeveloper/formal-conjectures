name: Voronovskaja proof verification

on:
  pull_request:
    paths:
      - 'FormalConjectures/Paper/VoronovskajaTypeFormula.lean'
      - 'FormalConjectures/Paper/VoronovskajaProof.lean'
      - 'FormalConjectures/Paper/VoronovskajaAffine.lean'
      - 'FormalConjectures/Paper/VoronovskajaEndpoints.lean'
      - 'FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean'
      - 'FormalConjecturesForMathlib/Probability/CDFConvergence.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialTails.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialMGF.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialLimit.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialTails.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialMoments.lean'
      - 'FormalConjecturesForMathlib/Order/Filter/ENNReal.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean'
      - '.github/workflows/voronovskaja-proof.yml'
  workflow_dispatch:

concurrency:
  group: voronovskaja-proof
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean dependency cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/mathlib
            .lake/packages
          key: voronovskaja-x64-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            voronovskaja-x64-

      - name: Fetch precompiled dependencies
        run: |
          if [ -f .lake/packages/mathlib/.lake/build/lib/lean/Mathlib.olean ]; then
            echo "Mathlib cache already restored."
          else
            lake exe cache get >/dev/null
          fi

      - name: Verify proof modules
        id: lean
        shell: bash
        run: |
          set +e
          log=/tmp/lean.log
          : > "$log"
          status=0

          compile_module() {
            source="$1"
            module="${source%.lean}"
            out=".lake/build/lib/lean/${module}.olean"
            ilean=".lake/build/lib/lean/${module}.ilean"
            mkdir -p "$(dirname "$out")"
            echo "=== Compiling ${source} ===" >> "$log"
            lake env lean "$source" -o "$out" -i "$ilean" >> "$log" 2>&1
          }

          compile_module FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean || status=$?
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Order/Filter/ENNReal.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialTails.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialMGF.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/CDFConvergence.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialLimit.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialTails.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            compile_module FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialMoments.lean || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            echo "=== Building affine and endpoint proof modules ===" >> "$log"
            lake build FormalConjectures.Paper.VoronovskajaAffine \
              FormalConjectures.Paper.VoronovskajaEndpoints >> "$log" 2>&1 || status=$?
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 760 "$log"
          exit 0

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-lean-log
          path: /tmp/lean.log

      - name: Fail when Lean fails
        if: steps.lean.outputs.status != '0'
        run: exit 1
