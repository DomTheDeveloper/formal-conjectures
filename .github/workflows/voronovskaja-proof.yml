name: Voronovskaja proof verification

on:
  pull_request:
    paths:
      - 'FormalConjectures/Paper/VoronovskajaTypeFormula.lean'
      - 'FormalConjectures/Paper/VoronovskajaProof.lean'
      - 'FormalConjectures/Paper/VoronovskajaAffine.lean'
      - 'FormalConjectures/Paper/VoronovskajaEndpoints.lean'
      - 'FormalConjecturesForMathlib/Probability/CentralLimitTheorem.lean'
      - 'FormalConjecturesForMathlib/Probability/CDFConvergence.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/Bernoulli.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/Binomial.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomial.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialTails.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/StandardizedBinomialMGF.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredGaussian.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialLimit.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialTails.lean'
      - 'FormalConjecturesForMathlib/Probability/Distributions/PoweredBinomialMoments.lean'
      - 'FormalConjecturesForMathlib/Order/Filter/ENNReal.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/LevyConvergence.lean'
      - 'FormalConjecturesForMathlib/MeasureTheory/Measure/CharacteristicFunction/TaylorExpansion.lean'
      - '.github/workflows/voronovskaja-proof.yml'
  workflow_dispatch:

concurrency:
  group: voronovskaja-proof-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Lean dependency cache
        uses: actions/cache/restore@v3
        with:
          path: ~/.cache/mathlib
          key: voronovskaja-arm-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('FormalConjectures/Paper/Voronovskaja*.lean', 'FormalConjecturesForMathlib/**/*.lean') }}
          restore-keys: |
            voronovskaja-arm-${{ hashFiles('lake-manifest.json') }}-

      - name: Fetch precompiled dependencies
        run: |
          lake exe cache unpack
          lake exe cache get

      - name: Verify proof modules
        shell: bash
        run: |
          set -o pipefail
          lake build \
            FormalConjecturesForMathlib.MeasureTheory.Measure.CharacteristicFunction.TaylorExpansion \
            FormalConjecturesForMathlib.Order.Filter.ENNReal \
            FormalConjecturesForMathlib.MeasureTheory.Measure.LevyConvergence \
            FormalConjecturesForMathlib.Probability.CentralLimitTheorem \
            FormalConjecturesForMathlib.Probability.Distributions.Bernoulli \
            FormalConjecturesForMathlib.Probability.Distributions.Binomial \
            FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomial \
            FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomialTails \
            FormalConjecturesForMathlib.Probability.Distributions.StandardizedBinomialMGF \
            FormalConjecturesForMathlib.Probability.CDFConvergence \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredGaussian \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialLimit \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialTails \
            FormalConjecturesForMathlib.Probability.Distributions.PoweredBinomialMoments \
            FormalConjectures.Paper.VoronovskajaTypeFormula \
            FormalConjectures.Paper.VoronovskajaProof \
            FormalConjectures.Paper.VoronovskajaAffine \
            FormalConjectures.Paper.VoronovskajaEndpoints \
            2>&1 | tee /tmp/lean.log

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voronovskaja-lean-log
          path: /tmp/lean.log
