name: Geode5 GDM-clean PR audit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read

jobs:
  lean:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'gdm-geode5-1000'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 on the GDM-clean base
        run: lake env lean -DwarningAsError=true FormalConjectures/Arxiv/2508.10245/Geode5.lean
