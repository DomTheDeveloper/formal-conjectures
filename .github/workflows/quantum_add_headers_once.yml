name: Add quantum proof copyright headers

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  add-headers:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/quantum-n6-proof-main-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/quantum-n6-proof-main-clean
          fetch-depth: 0

      - name: Add standard headers to proof modules
        shell: bash
        run: |
          set -euo pipefail
          header=$(mktemp)
          cat > "$header" <<'EOF'
          /-
          Copyright 2026 The Formal Conjectures Authors.

          Licensed under the Apache License, Version 2.0 (the "License");
          you may not use this file except in compliance with the License.
          You may obtain a copy of the License at

              https://www.apache.org/licenses/LICENSE-2.0

          Unless required by applicable law or agreed to in writing, software
          distributed under the License is distributed on an "AS IS" BASIS,
          WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          See the License for the specific language governing permissions and
          limitations under the License.
          -/

          EOF

          find QuantumGraphN6D3 -type f -name '*.lean' -print0 |
            while IFS= read -r -d '' file; do
              if ! head -n 5 "$file" | grep -q 'Copyright 2026 The Formal Conjectures Authors.'; then
                tmp=$(mktemp)
                cat "$header" "$file" > "$tmp"
                mv "$tmp" "$file"
              fi
            done

          rm -f "$header"

      - name: Commit mechanical header changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'All proof modules already have standard headers.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add QuantumGraphN6D3/*.lean
          git commit -m 'Add copyright headers to quantum proof modules'
          git push origin HEAD:agent/quantum-n6-proof-main-clean
