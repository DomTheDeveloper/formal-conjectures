name: A263135 targeted audit

on:
  pull_request:
    paths:
      - 'FormalConjectures/OEIS/263135.lean'
      - '.github/workflows/a263135-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Get cache
        run: |
          lake exe cache unpack
          lake exe cache get
      - name: Check A263135
        run: lake env lean FormalConjectures/OEIS/263135.lean
