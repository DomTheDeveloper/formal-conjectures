name: Integrate Green14 certificate proofs

on:
  push:
    branches:
      - agent/green14-certificates-20-39
    paths:
      - 'scripts/integrate_green14_certificates.py'
      - 'FormalConjectures/GreensOpenProblems/Green14Core.lean'
      - '.github/workflows/green14-integrate.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: green14-integrate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/green14-certificates-20-39
      - name: Apply guarded source rewrite
        run: python3 scripts/integrate_green14_certificates.py
      - name: Review exact rewrite
        run: |
          git diff --check
          git diff --stat
          grep -n 'theorem W_3_20_lower\|theorem W_3_39_lower' \
            FormalConjectures/GreensOpenProblems/14.lean
          ! grep -nE 'theorem W_3_(2[0-9]|3[0-9])_lower.*:= sorry' \
            FormalConjectures/GreensOpenProblems/14.lean
      - name: Commit integrated catalog source
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            FormalConjectures/GreensOpenProblems/14.lean \
            FormalConjectures/GreensOpenProblems/Green14Certificates.lean \
            FormalConjectures/GreensOpenProblems/Green14FiniteExistence.lean
          if git diff --cached --quiet; then
            echo 'Catalog already integrated.'
            exit 0
          fi
          git commit -m 'Green14: wire certificates into catalog theorems'
          git push origin HEAD:agent/green14-certificates-20-39
