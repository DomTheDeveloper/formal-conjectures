name: Repair A261865 terminal-box and base dependencies

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-8.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              n = text.count(old)
              if n != 1:
                  raise SystemExit(f'{path}: expected one match, found {n}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          box = 'FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean'
          replace_once(box,
              '  by_cases h : i = j\n'
              '  · simp [terminalCoordinateSet, h,\n'
              '      UnitAddCircle.volume_frontier_terminalArc (ha0 i) (ha1 i)]\n'
              '  · simp [terminalCoordinateSet, h,\n'
              '      UnitAddCircle.volume_frontier_terminalArc_compl (ha0 i) (ha1 i)]\n',
              '  by_cases h : i = j\n'
              '  · subst i\n'
              '    simpa [terminalCoordinateSet] using\n'
              '      UnitAddCircle.volume_frontier_terminalArc (ha0 j) (ha1 j)\n'
              '  · simpa [terminalCoordinateSet, h] using\n'
              '      UnitAddCircle.volume_frontier_terminalArc_compl (ha0 i) (ha1 i)\n')

          replace_once(box,
              '  by_cases h : i = j\n'
              '  · simp [terminalCoordinateSet, h, UnitAddCircle.volume_terminalArc (ha0 i) (ha1 i)]\n'
              '  · simp [terminalCoordinateSet, h, UnitAddCircle.volume_terminalArc_compl (ha0 i) (ha1 i)]\n',
              '  by_cases h : i = j\n'
              '  · subst i\n'
              '    simpa [terminalCoordinateSet] using\n'
              '      UnitAddCircle.volume_terminalArc (ha0 j) (ha1 j)\n'
              '  · simpa [terminalCoordinateSet, h] using\n'
              '      UnitAddCircle.volume_terminalArc_compl (ha0 i) (ha1 i)\n')

          replace_once(box,
              '      _ = a j * ∏ i ∈ Finset.univ.erase j, (1 - a i) := by\n'
              '        simp\n',
              '      _ = a j * ∏ i ∈ Finset.univ.erase j, (1 - a i) := by\n'
              '        simp only [if_pos rfl]\n'
              '        apply congrArg (fun x => a j * x)\n'
              '        apply Finset.prod_congr rfl\n'
              '        intro i hi\n'
              '        have hij : i ≠ j := (Finset.mem_erase.mp hi).1\n'
              '        simp [hij]\n')

          replace_once(box,
              '    (measurableSet_terminalBox j a) (by simpa [μ] using volume_frontier_terminalBox j a ha0 ha1)\n',
              '    (measurableSet_terminalBox j a) (by\n'
              '      change (volume (frontier (terminalBox j a))).toNNReal = 0\n'
              '      rw [volume_frontier_terminalBox j a ha0 ha1]\n'
              '      rfl)\n')

          replace_once(box,
              '  convert hd using 1\n'
              '  simp only [μ]\n'
              '  rw [show (((⟨volume, inferInstance⟩ : ProbabilityMeasure (UnitAddTorus ι))\n'
              '      (terminalBox j a) : ℝ≥0) : ℝ) =\n'
              '      (volume (terminalBox j a)).toReal by simp]\n'
              '  rw [volume_terminalBox j a ha0 ha1, ENNReal.toReal_ofReal]\n'
              '  positivity\n',
              '  convert hd using 1\n'
              '  change a j * ∏ i ∈ Finset.univ.erase j, (1 - a i) =\n'
              '    (volume (terminalBox j a)).toReal\n'
              '  rw [volume_terminalBox j a ha0 ha1, ENNReal.toReal_ofReal]\n'
              '  positivity\n')

          base = 'FormalConjectures/OEIS/A261865Base.lean'
          replace_once(base,
              'public import FormalConjecturesUtil\n',
              'public import Mathlib\n')

          Path('.github/workflows/a261865-one-shot-repair-8.yml').unlink()
          PY

      - name: Commit repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/Analysis/Equidistribution/TerminalBox.lean \
                  FormalConjectures/OEIS/A261865Base.lean \
                  .github/workflows/a261865-one-shot-repair-8.yml
          git commit -m 'Fix A261865 terminal-box and base compatibility'
          git push origin HEAD:a261865-research
