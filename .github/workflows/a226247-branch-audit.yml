name: A226247 branch proof audit

on:
  push:
    branches:
      - solve-a226247-1000

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile A226247 with warnings as errors
        run: lake env lean -DwarningAsError=true FormalConjectures/OEIS/226247.lean
