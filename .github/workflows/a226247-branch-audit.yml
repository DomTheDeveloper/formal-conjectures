name: A226247 branch proof audit

on:
  push:
    branches:
      - solve-a226247-1000
    paths-ignore:
      - AuditResults/**

permissions:
  contents: write
  issues: write
  statuses: write

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile A226247 with warnings as errors
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lake env lean -DwarningAsError=true FormalConjectures/OEIS/226247.lean \
            2>&1 | tee a226247-audit.log
      - name: Persist compiler transcript
        if: always()
        shell: bash
        run: |
          mkdir -p AuditResults
          {
            echo "commit=${GITHUB_SHA}"
            echo "outcome=${{ steps.compile.outcome }}"
            echo
            cat a226247-audit.log 2>/dev/null || true
          } > AuditResults/A226247.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add AuditResults/A226247.log
          git commit -m "Record A226247 compiler transcript [skip ci]" || true
          git push
      - name: Publish audit result
        if: always()
        uses: actions/github-script@v7
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        with:
          script: |
            const passed = process.env.COMPILE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha: context.sha,
              state: passed ? 'success' : 'failure', context: 'A226247 focused Lean audit',
              description: passed ? 'Lean proof compiled with warnings as errors' : 'Lean proof compilation failed'
            });
      - name: Enforce compiler result
        if: steps.compile.outcome != 'success'
        run: exit 1
