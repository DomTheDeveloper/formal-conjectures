name: WorldCup7 targeted Lean audit

on:
  pull_request:

permissions:
  contents: read

jobs:
  worldcup7:
    if: github.head_ref == 'ci/chomp-native-final-audit'
    name: Compile immutable Chomp checker
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout immutable Chomp proof commit
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 36fca20b64b95fd3daffcac33293251cda296be8

      - name: Confirm immutable source
        run: test "$(git rev-parse HEAD)" = "36fca20b64b95fd3daffcac33293251cda296be8"

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Compile exact Lean-native Chomp checker
        run: |
          set -o pipefail
          /usr/bin/time -v lake env lean FormalConjectures/Paper/ChompThreeOpeningsNative.lean \
            2>&1 | tee chomp-native-proof.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chomp-native-proof-36fca20-log
          path: chomp-native-proof.log
          if-no-files-found: warn
