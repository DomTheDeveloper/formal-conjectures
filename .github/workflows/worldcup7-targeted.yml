name: WorldCup7 targeted Lean audit

on:
  pull_request:

permissions:
  contents: read

jobs:
  worldcup7:
    if: startsWith(github.head_ref, 'ci/chomp-native-final-audit')
    name: Compile immutable Chomp checker
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout immutable Chomp proof commit
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 4a84dec796d9bcef8ae42a8006e8c6766b002468

      - name: Confirm immutable source
        run: test "$(git rev-parse HEAD)" = "4a84dec796d9bcef8ae42a8006e8c6766b002468"

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Compile Lean-native Chomp checker
        run: |
          set -o pipefail
          /usr/bin/time -v lake build FormalConjectures.Paper.ChompThreeOpeningsNative \
            2>&1 | tee chomp-native-proof.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chomp-native-proof-4a84dec-log
          path: chomp-native-proof.log
          if-no-files-found: warn
