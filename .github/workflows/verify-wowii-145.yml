name: Verify WOWII 145 proof

on:
  push:
    branches:
      - wowii-145-proof-20260721
    paths:
      - Proofs/145.lean
      - .github/workflows/verify-wowii-145.yml
      - lake-manifest.json
      - lean-toolchain
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: wowii-145-proof-20260721
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore mathlib cache
        run: lake exe cache get
      - name: Verify proof and axioms
        run: |
          set +e
          lake env lean Proofs/145.lean > Proofs/145.verify.log 2>&1
          status=$?
          if grep -q 'sorryAx' Proofs/145.verify.log; then
            echo 'Unexpected sorryAx in proof theorem' >> Proofs/145.verify.log
            status=1
          fi
          set -e
          cat Proofs/145.verify.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Proofs/145.verify.log
          git commit -m 'Record WOWII 145 verification log [skip verify]' || true
          git push origin HEAD:wowii-145-proof-20260721
          exit "$status"
