name: Verify WOWII 145 proof

on:
  push:
    branches:
      - wowii-145-proof-20260721
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore mathlib cache
        run: |
          lake exe cache get
      - name: Verify proof and axioms
        run: |
          lake env lean Proofs/145.lean 2>&1 | tee verify-145.log
          if grep -q 'sorryAx' verify-145.log; then
            echo 'Unexpected sorryAx in proof theorem' >&2
            exit 1
          fi
