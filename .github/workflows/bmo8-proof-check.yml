name: BMO 8 proof check

on:
  push:
    branches:
      - bmo8-slim-audit
  pull_request:
    branches:
      - bmo8-upstream-base

permissions:
  contents: read

jobs:
  check:
    name: check (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL "https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: |
          lake exe cache unpack || true
          lake exe cache get

      - name: Build BMO 8 proof with warnings as errors
        run: lake --wfail build FormalConjectures.Other.BeaverMathOlympiad8Proof

      - name: Check BMO 8 theorem axioms
        run: |
          cp FormalConjectures/Other/BeaverMathOlympiad8Proof.lean BMO8ProofAudit.lean
          printf '\n#print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_solved\n' >> BMO8ProofAudit.lean
          lake env lean BMO8ProofAudit.lean
