name: BMO 8 proof check

on:
  push:
    branches:
      - bmo8-slim-audit
  pull_request:
    branches:
      - bmo8-upstream-base

permissions:
  contents: read

jobs:
  check:
    name: check (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-slim
            elan_target: x86_64-unknown-linux-gnu
          - runner: macos-15-intel
            elan_target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL "https://github.com/leanprover/elan/releases/download/v1.4.2/elan-${{ matrix.elan_target }}.tar.gz" | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: |
          lake exe cache unpack || true
          lake exe cache get

      - name: Check BMO 8 proof and axioms
        run: |
          cp FormalConjectures/Other/BeaverMathOlympiad8Proof.lean BMO8ProofAudit.lean
          printf '\n#print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_solved\n' >> BMO8ProofAudit.lean
          lake env lean BMO8ProofAudit.lean
