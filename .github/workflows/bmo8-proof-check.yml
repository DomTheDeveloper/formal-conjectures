# This audit ignores unrelated `sorry` warnings from other open BMO statements.

name: BMO 8 proof check

on:
  push:
    branches:
      - bmo8-slim-audit
  pull_request:
    branches:
      - bmo8-upstream-base

permissions:
  contents: read

concurrency:
  group: bmo8-proof-check
  cancel-in-progress: true

jobs:
  check:
    name: check (macos-15-intel)
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL "https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-apple-darwin.tar.gz" | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: |
          lake exe cache unpack || true
          lake exe cache get

      - name: Reject placeholders in BMO 8 proof
        run: |
          if grep -nE '\b(sorry|admit)\b' FormalConjectures/Other/BeaverMathOlympiad8Proof.lean; then
            echo 'BMO 8 proof contains a placeholder.' >&2
            exit 1
          fi

      - name: Build BMO 8 proof
        run: lake build FormalConjectures.Other.BeaverMathOlympiad8Proof

      - name: Check BMO 8 theorem axioms
        run: |
          set -o pipefail
          cp FormalConjectures/Other/BeaverMathOlympiad8Proof.lean BMO8ProofAudit.lean
          printf '\n#print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_solved\n' >> BMO8ProofAudit.lean
          lake env lean BMO8ProofAudit.lean 2>&1 | tee BMO8ProofAudit.log
          if grep -q 'sorryAx' BMO8ProofAudit.log; then
            echo 'BMO 8 theorem depends on sorryAx.' >&2
            exit 1
          fi
