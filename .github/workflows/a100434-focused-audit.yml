name: A100434 focused audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/a100434-audit-trigger'
      - '.github/workflows/a100434-focused-audit.yml'

concurrency:
  group: a100434-focused-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 193b08e6bccf96afc1e876cd1a0c99d49eb087d2
          fetch-depth: 1
      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: a100434-focused-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}
          restore-keys: a100434-focused-${{ runner.os }}-
      - name: Get Mathlib cache
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            lake exe cache get && exit 0
            sleep 10
          done
          exit 1
      - name: Compile exact proof
        run: |
          set -o pipefail
          lake env lean FormalConjectures/OEIS/100434.lean 2>&1 | tee /tmp/a100434-compile.log
      - name: Audit theorem axioms
        if: success()
        run: |
          cat > /tmp/A100434Axioms.lean <<'EOF'
          import FormalConjectures.OEIS.«100434»
          #print axioms OeisA100434.a100434_auxiliary_identities
          EOF
          lake env lean /tmp/A100434Axioms.lean 2>&1 | tee /tmp/a100434-axioms.log
          ! grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' /tmp/a100434-axioms.log
      - name: Upload exact diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a100434-focused-${{ github.run_id }}
          path: |
            /tmp/a100434-compile.log
            /tmp/a100434-axioms.log
          if-no-files-found: warn
