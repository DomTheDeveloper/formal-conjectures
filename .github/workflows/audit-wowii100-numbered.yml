# Copyright 2025 The Formal Conjectures Authors.

name: Audit numbered WOWII 100 proof

on:
  pull_request:
    paths:
      - 'FormalConjectures/WrittenOnTheWallII/100.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture100Complete.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture100ForkProof.lean'
      - '.github/workflows/audit-wowii100-numbered.yml'

permissions:
  contents: read

jobs:
  audit-wowii100:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        run: |
          lake exe cache get

      - name: Reject placeholders in numbered entry
        run: |
          if grep -nE '\b(sorry|admit)\b' FormalConjectures/WrittenOnTheWallII/100.lean; then
            echo 'placeholder found in 100.lean'
            exit 1
          fi

      - name: Build proof dependencies
        run: |
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture100Complete

      - name: Compile and audit exact numbered theorem
        run: |
          set -o pipefail
          lake env lean FormalConjectures/WrittenOnTheWallII/100.lean 2>&1 | tee wowii100-audit.log
          if grep -E 'sorryAx|Lean\.ofReduce|Lean\.trustCompiler|error:' wowii100-audit.log; then
            echo 'disallowed axiom or compiler error found'
            exit 1
          fi
          grep -F "WrittenOnTheWallII.GraphConjecture100.conjecture100' depends on axioms:" wowii100-audit.log

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii100-numbered-audit
          path: wowii100-audit.log
          if-no-files-found: warn
