name: Verify WOWII 100

on:
  push:
    branches:
      - agent/solve-wowii-100

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Mathlib cache
        run: |
          lake exe cache get
      - name: Build target
        run: |
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture100
      - name: Audit axioms
        run: |
          cat > AxiomAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture100
          #print axioms WrittenOnTheWallII.GraphConjecture100.conjecture100
          EOF
          lake env lean AxiomAudit.lean
