name: Fast WOWII 314 proof diagnostics

on:
  pull_request:
    paths:
      - WOWII/**
      - .github/workflows/wowii314-fast-macos.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wowii314-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Prepare exact minimal statement import
        shell: bash
        run: |
          set -euo pipefail
          cat > WOWII/GraphConjecture314Statement.lean <<'EOF'
          import Mathlib.Combinatorics.SimpleGraph.Acyclic
          import Mathlib.Combinatorics.SimpleGraph.Connectivity.Connected
          import Mathlib.Combinatorics.SimpleGraph.Metric
          import Mathlib.Combinatorics.SimpleGraph.Circulant
          import Mathlib.Combinatorics.SimpleGraph.Finite
          import FormalConjecturesForMathlib.Combinatorics.SimpleGraph.WellTotallyDominated
          import Mathlib.Tactic.FinCases
          import Mathlib.Tactic.IntervalCases
          import Lean.Elab.Tactic.Omega
          import Lean.Elab.Tactic.Grind

          open Classical
          namespace WrittenOnTheWallII.GraphConjecture314
          open SimpleGraph
          variable {α : Type*} [Fintype α] [DecidableEq α]

          noncomputable def largestInducedPathSize
              (G : SimpleGraph α) [DecidableRel G.Adj] : ℕ :=
            sSup { n | ∃ s : Finset α,
              s.card = n ∧
              (G.induce (s : Set α)).IsTree ∧
              ∀ v : (s : Set α), (G.induce (s : Set α)).degree v ≤ 2 }

          end WrittenOnTheWallII.GraphConjecture314
          EOF
          python3 - <<'PY'
          from pathlib import Path
          p = Path('WOWII/ZZGraphConjecture314Core.lean')
          s = p.read_text().replace(
              'import FormalConjectures.WrittenOnTheWallII.GraphConjecture314',
              'import WOWII.GraphConjecture314Statement', 1)
          p.write_text(s)
          PY

      - name: Build exact domination definition
        run: lake build FormalConjecturesForMathlib.Combinatorics.SimpleGraph.WellTotallyDominated

      - name: Compile complete proof chain
        shell: bash
        run: |
          set -euo pipefail
          : > wowii314-fast-build.log
          files=(
            WOWII/GraphConjecture314Statement.lean
            WOWII/ZZGraphConjecture314Core.lean
            WOWII/ZZGraphConjecture314DominatingEdge.lean
            WOWII/ZZGraphConjecture314PathTree.lean
            WOWII/ZZGraphConjecture314BipartiteCommon.lean
            WOWII/ZZGraphConjecture314ChainGraph.lean
            WOWII/ZZGraphConjecture314Cycle5.lean
            WOWII/ZZGraphConjecture314Cycle5Blowup.lean
            WOWII/ZZGraphConjecture314P5Bridge.lean
            WOWII/ZZGraphConjecture314ConditionalFinal.lean
            WOWII/ZZGraphConjecture314GeodesicP5.lean
            WOWII/ZZGraphConjecture314BipartiteClassification.lean
            WOWII/ZZGraphConjecture314CycleDichotomy.lean
            WOWII/ZZGraphConjecture314C5Embedding.lean
            WOWII/ZZGraphConjecture314C5Dominates.lean
            WOWII/ZZGraphConjecture314C5Bags.lean
            WOWII/ZZGraphConjecture314C5BlowupClassification.lean
            WOWII/ZZGraphConjecture314Final.lean
          )
          mkdir -p .lake/build/lib/lean/WOWII
          for file in "${files[@]}"; do
            module="${file%.lean}"
            output=".lake/build/lib/lean/${module}.olean"
            mkdir -p "$(dirname "$output")"
            echo "=== Checking $file ===" | tee -a wowii314-fast-build.log
            lake env lean -o "$output" "$file" 2>&1 | tee -a wowii314-fast-build.log
          done

      - name: Upload diagnostic transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii314-fast-ubuntu
          path: wowii314-fast-build.log
          if-no-files-found: warn
