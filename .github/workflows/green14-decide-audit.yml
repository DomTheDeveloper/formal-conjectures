name: Green14 kernel decide audit

on:
  push:
    branches:
      - audit/green14-kernel-decide
    paths:
      - '.github/workflows/green14-decide-audit.yml'
  pull_request:
    paths:
      - '.github/workflows/green14-decide-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: green14-kernel-decide-${{ github.ref }}
  cancel-in-progress: true

jobs:
  t20-decide:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Fetch Mathlib cache and build core
        run: |
          lake exe cache get
          lake build FormalConjectures.GreensOpenProblems.Green14Core
      - name: Generate kernel-decided t=20 certificate
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          src = Path('FormalConjectures/GreensOpenProblems/Green14Certificates.lean').read_text()
          src = src[:src.index('private def zeros21')]
          src = src.replace('  native_decide', '  decide')
          src = src.replace(
              'import FormalConjectures.GreensOpenProblems.Green14Core\n',
              'import FormalConjectures.GreensOpenProblems.Green14Core\n\nset_option maxHeartbeats 0\nset_option maxRecDepth 10000000\n')
          src += '\n#print axioms Green14.Certificate.valid_20\n\nend Green14.Certificate\n'
          Path('/tmp/Green14Decide20.lean').write_text(src)
          PY
      - name: Compile kernel proof and capture diagnostic
        id: compile
        shell: bash
        run: |
          set +e
          /usr/bin/time -v lake env lean /tmp/Green14Decide20.lean > green14-decide20.log 2>&1
          code=$?
          tail -n 160 green14-decide20.log > green14-decide20-tail.log
          cat green14-decide20-tail.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: green14-decide20-log
          path: |
            green14-decide20.log
            green14-decide20-tail.log
          if-no-files-found: error
      - name: Enforce clean kernel result
        shell: bash
        run: |
          test '${{ steps.compile.outputs.exit_code }}' = '0'
          ! grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' green14-decide20.log
