name: Check C217 kernel development

on:
  push:
    branches:
      - agent/c217-kernel-dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact development branch
        uses: actions/checkout@v6

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore repository Mathlib cache
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Reject proof holes and trusted computation shortcuts
        run: |
          set -euxo pipefail
          files=(
            C217DegreeBound.lean
            C217DegreeTwoTraceable.lean
            C217Partial.lean
            C217ExceptionalBranch.lean
          )
          if grep -nE '\b(sorry|admit|native_decide)\b' "${files[@]}"; then
            echo 'Forbidden proof shortcut found.' >&2
            exit 1
          fi

      - name: Compile focused C217 modules and audit axioms
        run: |
          set -euxo pipefail
          : > c217-kernel-check.log
          for file in \
            C217DegreeBound.lean \
            C217DegreeTwoTraceable.lean \
            C217Partial.lean \
            C217ExceptionalBranch.lean
          do
            echo "=== $file ===" | tee -a c217-kernel-check.log
            lake env lean "$file" 2>&1 | tee -a c217-kernel-check.log
          done
          if grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' c217-kernel-check.log; then
            echo 'Forbidden axiom found in audit output.' >&2
            exit 1
          fi

      - name: Upload focused audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c217-kernel-check-log
          path: c217-kernel-check.log
          compression-level: 0
          retention-days: 7
