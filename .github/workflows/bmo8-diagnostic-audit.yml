name: BMO8 proof diagnostic audit

on:
  pull_request:
    branches:
      - bmo8-upstream-base-20260723
    paths:
      - FormalConjectures/Other/BeaverMathOlympiad.lean
      - FormalConjectures/Other/BeaverMathOlympiad8Proof.lean
      - BMO8AuditTrigger.txt
      - .github/workflows/bmo8-diagnostic-audit.yml

permissions:
  contents: read

jobs:
  diagnose-bmo8:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean and cache
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/lake" exe cache get >/dev/null

      - name: Compile exact BMO8 proof and preserve diagnostics
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set +e
          "$HOME/.elan/bin/lake" build FormalConjectures.Other.BeaverMathOlympiad8Proof > BMO8Compile.log 2>&1
          status=$?
          cat BMO8Compile.log
          echo "$status" > BMO8Compile.status
          exit "$status"

      - name: Audit axioms when compilation succeeds
        if: steps.compile.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          cat > BMO8Axioms.lean <<'EOF'
          import FormalConjectures.Other.BeaverMathOlympiad8Proof
          #print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_8_proof
          EOF
          "$HOME/.elan/bin/lake" env lean BMO8Axioms.lean > BMO8Axioms.log 2>&1
          cat BMO8Axioms.log
          if grep -q 'sorryAx' BMO8Axioms.log; then
            echo 'Unexpected sorryAx dependency in BMO8 theorem.' >&2
            exit 1
          fi

      - name: Upload BMO8 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bmo8-lean-diagnostics
          path: |
            BMO8Compile.log
            BMO8Compile.status
            BMO8Axioms.log
          if-no-files-found: ignore

      - name: Enforce compilation success
        if: steps.compile.outcome != 'success'
        shell: bash
        run: exit 1
