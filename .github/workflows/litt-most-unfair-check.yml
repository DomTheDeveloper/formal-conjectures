name: Litt most-unfair proof check

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/Other/LittMostUnfairBet*.lean'
      - 'scripts/verify_litt_most_unfair.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: litt-most-unfair-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  audit:
    name: pinned Lean and exact audit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout proof head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up pinned Lean environment
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: false
      - name: Remove only the redundant left-endpoint tactic
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointConstant.lean')
          text = path.read_text()
          old = '''  have hrevLeft : left.rev = right := by
    apply Fin.ext
    dsimp [left, right, Fin.rev]
    omega'''
          new = '''  have hrevLeft : left.rev = right := by
    apply Fin.ext
    dsimp [left, right, Fin.rev]'''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('could not locate the left endpoint reversal proof')
          path.write_text(text)
          PY
      - name: Reject proof holes and trust shortcuts
        run: |
          set -euo pipefail
          files=$(printf '%s\n' FormalConjectures/Other/LittMostUnfairBet*.lean)
          if grep -nE '(^|[^[:alnum:]_])(sorry|admit|native_decide)([^[:alnum:]_]|$)' $files; then
            exit 1
          fi
          if grep -nE '^[[:space:]]*(axiom|unsafe|opaque)([[:space:]]|$)' $files; then
            exit 1
          fi
      - name: Build complete Litt development
        run: |
          set -o pipefail
          lake build FormalConjectures.Other.LittMostUnfairBet \
            2>&1 | tee /tmp/litt-lean.log
      - name: Audit terminal theorem axioms
        run: |
          set -o pipefail
          cat > LittAxiomAudit.lean <<'EOF'
          import FormalConjectures.Other.LittMostUnfairBet

          /-! Focused axiom audit for the Litt most-unfair theorem. -/

          #print axioms LittMostUnfairBet.most_unfair_litt_coin_word_bet
          #print axioms LittMostUnfairBet.endpoint_flip_pair_attains
          EOF
          lake env lean -DwarningAsError=true LittAxiomAudit.lean \
            2>&1 | tee -a /tmp/litt-lean.log
          if grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' /tmp/litt-lean.log; then
            exit 1
          fi
      - name: Run exact finite audit
        run: python3 scripts/verify_litt_most_unfair.py --max-length 10
      - name: Persist verified source repair
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointConstant.lean; then
            exit 0
          fi
          git config user.name 'ProofOrchestrator'
          git config user.email 'actions@users.noreply.github.com'
          git add FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointConstant.lean
          git commit -m 'Remove redundant Litt left-endpoint arithmetic tactic'
          git push origin "HEAD:${HEAD_REF}"
      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: litt-most-unfair-lean-log
          path: |
            /tmp/litt-lean.log
            LittAxiomAudit.lean
          if-no-files-found: warn
