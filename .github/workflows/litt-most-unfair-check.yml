# Synchronization trigger for the current main-branch Litt gate.

name: Litt most-unfair proof check

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/Other/LittMostUnfairBet*.lean'
      - 'scripts/verify_litt_most_unfair.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: litt-most-unfair-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  audit:
    name: pinned Lean and exact audit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout proof head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up pinned Lean environment
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: false
      - name: Reject proof holes and trust shortcuts
        run: |
          set -euo pipefail
          files=$(printf '%s\n' FormalConjectures/Other/LittMostUnfairBet*.lean)
          if grep -nE '(^|[^[:alnum:]_])(sorry|admit|native_decide)([^[:alnum:]_]|$)' $files; then
            exit 1
          fi
          if grep -nE '^[[:space:]]*(axiom|unsafe|opaque)([[:space:]]|$)' $files; then
            exit 1
          fi
      - name: Compile complete Litt development
        run: |
          set -euo pipefail
          lake build FormalConjectures.Other.LittMostUnfairBet
      - name: Run exact finite audit
        run: python3 scripts/verify_litt_most_unfair.py --max-length 10
