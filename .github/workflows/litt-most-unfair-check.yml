name: Litt final Lean audit

on:
  pull_request:
    branches:
      - audit/litt-upstream-base
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: litt-final-audit-${{ github.sha }}
  cancel-in-progress: false

jobs:
  final-audit:
    name: exact audit and Lean 4.27 kernel check
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: |
          set -euo pipefail
          lake exe cache unpack || true
          lake exe cache get

      - name: Exhaustively verify lengths 2 through 10
        run: python3 scripts/verify_litt_most_unfair.py --max-length 10

      - name: Reject proof holes and unsupported trust shortcuts
        run: |
          set -euo pipefail
          mapfile -t files < <(find FormalConjectures/Other -maxdepth 1 \
            -name 'LittMostUnfairBet*.lean' -print | sort)
          if grep -nE '\b(sorry|admit|native_decide|unsafe|axiom)\b' "${files[@]}"; then
            echo 'Unsupported proof hole, custom axiom, or trust shortcut found.'
            exit 1
          fi

      - name: Build the complete terminal theorem dependency graph
        run: |
          set -euo pipefail
          lake build FormalConjectures.Other.LittMostUnfairBet

      - name: Compile with warnings as errors and audit axioms
        run: |
          set -euo pipefail
          lake env lean -DwarningAsError=true \
            FormalConjectures/Other/LittMostUnfairBet.lean 2>&1 | tee /tmp/litt-axioms.txt
          if grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce' /tmp/litt-axioms.txt; then
            echo 'Terminal theorem uses an unsupported axiom or compiler-trust shortcut.'
            exit 1
          fi
