name: Litt most-unfair proof check

on:
  push:
    branches:
      - agent/litt-most-unfair-proof
  pull_request:
    branches:
      - audit/litt-upstream-base
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: litt-most-unfair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exact-audit:
    name: exact finite audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
      - name: Exhaustively verify lengths 2 through 10
        run: python3 scripts/verify_litt_most_unfair.py --max-length 10

  lean-check:
    name: check Lean 4.27
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL "https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: |
          lake exe cache unpack || true
          lake exe cache get

      - name: Compile statement and overlap core
        run: |
          lake env lean FormalConjectures/Other/LittMostUnfairBet.lean
          lake env lean FormalConjectures/Other/LittMostUnfairBetProof.lean

      - name: Compile Walsh variance-gap modules
        run: |
          lake env lean FormalConjectures/Other/LittMostUnfairBetWalshInteriorGap.lean

      - name: Compile full Walsh variance bridge
        run: |
          lake env lean FormalConjectures/Other/LittMostUnfairBetWalshVarianceBridge.lean
