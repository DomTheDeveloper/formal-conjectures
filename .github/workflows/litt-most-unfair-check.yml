name: Litt most-unfair proof check

on:
  push:
    branches: [audit/litt-final-current-main]
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/Other/LittMostUnfairBet*.lean'
      - 'scripts/verify_litt_most_unfair.py'
      - '.github/workflows/litt-most-unfair-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: litt-most-unfair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pinned Lean and exact audit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout proof head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up pinned Lean environment
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: false
      - name: Reject proof holes and trust shortcuts
        run: |
          set -euo pipefail
          files=$(printf '%s\n' FormalConjectures/Other/LittMostUnfairBet*.lean)
          if grep -nE '(^|[^[:alnum:]_])(sorry|admit|native_decide)([^[:alnum:]_]|$)' $files; then
            exit 1
          fi
          if grep -nE '^[[:space:]]*(axiom|unsafe|opaque)([[:space:]]|$)' $files; then
            exit 1
          fi
      - name: Build complete Litt development
        run: |
          set -o pipefail
          lake build FormalConjectures.Other.LittMostUnfairBet \
            2>&1 | tee /tmp/litt-lean.log
      - name: Audit terminal theorem axioms
        run: |
          set -o pipefail
          cat > LittAxiomAudit.lean <<'EOF'
          import FormalConjectures.Other.LittMostUnfairBet

          /-! Focused axiom audit for the Litt most-unfair theorem. -/

          #print axioms LittMostUnfairBet.most_unfair_litt_coin_word_bet
          #print axioms LittMostUnfairBet.endpoint_flip_pair_attains
          EOF
          lake env lean -DwarningAsError=true LittAxiomAudit.lean \
            2>&1 | tee -a /tmp/litt-lean.log
          if grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' /tmp/litt-lean.log; then
            exit 1
          fi
      - name: Run exact finite audit
        run: python3 scripts/verify_litt_most_unfair.py --max-length 10
      - name: Report result on PR 239
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          {
            echo '## Final Litt current-main audit'
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Result: **${JOB_STATUS}**"
            echo
            echo 'Checks: placeholder/trust scan, pinned Lean module build, terminal axiom audit, exact replay through length 10.'
            if [[ -f /tmp/litt-lean.log ]]; then
              echo
              echo '<details><summary>Lean transcript tail</summary>'
              echo
              echo '```text'
              tail -n 120 /tmp/litt-lean.log || true
              echo '```'
              echo '</details>'
            fi
          } >/tmp/litt-pr-comment.md
          gh pr comment 239 --repo DomTheDeveloper/formal-conjectures --body-file /tmp/litt-pr-comment.md
      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: litt-most-unfair-lean-log
          path: |
            /tmp/litt-lean.log
            LittAxiomAudit.lean
          if-no-files-found: warn
