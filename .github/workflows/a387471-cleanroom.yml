name: Clean-room A387471 audit

on:
  push:
    branches: [ci/a387471-cleanroom]
  workflow_dispatch:

concurrency:
  group: a387471-cleanroom
  cancel-in-progress: true

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Fetch exact CRL proof commit
        run: |
          git clone https://github.com/DomTheDeveloper/crl.git crl
          cd crl
          git checkout 17ffe1b3834dce1b8d66c25b1814a10a91288365
          test "$(git rev-parse HEAD)" = "17ffe1b3834dce1b8d66c25b1814a10a91288365"
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard source
        run: |
          ! grep -RnE --include='*.lean' '(^|[[:space:]])(sorry|admit|native_decide)([[:space:]]|$)' crl/proofs/lean/A387471
      - name: Resolve pinned Mathlib
        working-directory: crl/proofs/lean/A387471
        run: lake update
      - name: Fetch Mathlib cache
        working-directory: crl/proofs/lean/A387471
        run: lake exe cache get || true
      - name: Build exact theorem stack
        working-directory: crl/proofs/lean/A387471
        shell: bash
        run: |
          set +e
          lake build > build.log 2>&1
          status=$?
          echo "$status" > build.status
          exit 0
      - name: Audit exact theorem axioms
        working-directory: crl/proofs/lean/A387471
        shell: bash
        run: |
          if grep -q 'sorryAx' build.log; then echo 99 > build.status; fi
      - name: Publish diagnostic to audit branch
        if: always()
        run: |
          cp crl/proofs/lean/A387471/build.log A387471_BUILD_LOG.txt || true
          cp crl/proofs/lean/A387471/build.status A387471_BUILD_STATUS.txt || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add A387471_BUILD_LOG.txt A387471_BUILD_STATUS.txt
          git commit -m 'ci: publish A387471 compiler diagnostic' || true
          git push origin HEAD:ci/a387471-cleanroom || true
