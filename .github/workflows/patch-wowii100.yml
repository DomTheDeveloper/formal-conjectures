name: Patch WOWII 100 proof

on:
  push:
    branches:
      - agent/solve-wowii-100

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/solve-wowii-100
      - name: Apply exact arithmetic rewrite
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('FormalConjectures/WrittenOnTheWallII/GraphConjecture100ForkProof.lean')
          text = path.read_text()
          old = '''        have hq2C :
            (A : ℝ) * ((A : ℝ) - 1) ^ 2 + (m : ℝ) * C ≤ q ^ 2 := by
          dsimp [C]
          convert hq2 using 1 <;> ring
'''
          new = '''        have hq2C :
            (A : ℝ) * ((A : ℝ) - 1) ^ 2 + (m : ℝ) * C ≤ q ^ 2 := by
          calc
            (A : ℝ) * ((A : ℝ) - 1) ^ 2 + (m : ℝ) * C =
                (A : ℝ) * ((A : ℝ) - 1) ^ 2
                  + (2 * (A : ℝ) - 1) * (m : ℝ) * ((A : ℝ) - 1)
                  + (m : ℝ) * ((A : ℝ) - 1) ^ 2 := by
                    dsimp [C]
                    ring
            _ ≤ q ^ 2 := hq2
'''
          if old not in text:
              print('Target already patched; no change needed.')
          else:
              path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjectures/WrittenOnTheWallII/GraphConjecture100ForkProof.lean
          git commit -m 'Expand WOWII 100 arithmetic identity'
          git push origin HEAD:agent/solve-wowii-100
