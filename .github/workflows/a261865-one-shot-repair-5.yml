name: Close residual A261865 support-module errors

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-5.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              n = text.count(old)
              if n != 1:
                  raise SystemExit(f'{path}: expected one match, found {n}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          arc = 'FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean'
          replace_once(arc,
              '  filter_upwards [AddCircle.closedBall_ae_eq_ball\n'
              '    (x := (c : UnitAddCircle)) (ε := r)] with y hy\n'
              '  constructor\n',
              '  filter_upwards [AddCircle.closedBall_ae_eq_ball\n'
              '    (x := (c : UnitAddCircle)) (ε := r)] with y hy\n'
              '  apply propext\n'
              '  constructor\n')

          pi = 'FormalConjecturesForMathlib/MeasureTheory/Probability/PiContinuitySet.lean'
          replace_once(pi,
              '  rw [heq, Measure.pi_pi]\n'
              '  simp [hnull]\n',
              '  rw [heq, Measure.pi_pi, Finset.prod_eq_zero_iff]\n'
              '  exact ⟨i, Finset.mem_univ i, by simp [hnull i]⟩\n')

          radicals = 'FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean'
          replace_once(radicals,
              '  field_simp [hsqrt, Real.sq_sqrt hpos.le]\n',
              '  field_simp [hsqrt]\n'
              '  exact (Real.sq_sqrt hpos.le).symm\n')

          Path('.github/workflows/a261865-one-shot-repair-5.yml').unlink()
          PY

      - name: Commit repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean \
                  FormalConjecturesForMathlib/MeasureTheory/Probability/PiContinuitySet.lean \
                  FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean \
                  .github/workflows/a261865-one-shot-repair-5.yml
          git commit -m 'Close residual A261865 support-module errors'
          git push origin HEAD:a261865-research
