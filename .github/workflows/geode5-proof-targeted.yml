name: Geode5 proof targeted audit

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  issues: write

jobs:
  proof-layers:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit-geode5-crt-proof' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 no-sorry proof modules
        id: compile
        shell: bash
        run: |
          set -uo pipefail
          test -z "$(grep -RInE '\b(sorry|admit)\b' FormalConjectures/Arxiv/2508.10245/Geode5Proof || true)"
          set +e
          {
            lake env lean -DwarningAsError=true \
              FormalConjectures/Arxiv/2508.10245/Geode5Proof/MomentAlgebra.lean
            first=$?
            if [ "$first" -eq 0 ]; then
              lake env lean -DwarningAsError=true \
                FormalConjectures/Arxiv/2508.10245/Geode5Proof/Integral.lean
              second=$?
            else
              second=0
            fi
            exit $(( first != 0 ? first : second ))
          } 2>&1 | tee /tmp/geode5-lean.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report compiler diagnostics
        if: always() && steps.compile.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/geode5-lean.log', 'utf8');
            const excerpt = raw.length > 50000 ? raw.slice(-50000) : raw;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Geode5 Lean diagnostics\n\nAudited commit: \`${context.payload.pull_request.head.sha}\`\n\n\`\`\`text\n${excerpt}\n\`\`\``
            });
      - name: Enforce compiler result
        if: always()
        shell: bash
        run: exit "${{ steps.compile.outputs.status || '1' }}"
