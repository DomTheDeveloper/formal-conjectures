name: Geode5 proof targeted audit

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  moment-algebra:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit-geode5-crt-proof' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 no-sorry proof modules
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(grep -RInE '\b(sorry|admit)\b' FormalConjectures/Arxiv/2508.10245/Geode5Proof || true)"
          lake env lean -DwarningAsError=true FormalConjectures/Arxiv/2508.10245/Geode5Proof/MomentAlgebra.lean
