name: OEIS A343881 Lean audit

on:
  push:
    branches: [audit/oeis-a343881]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile theorem and audit axioms
        run: |
          # The default-branch PR workflow is the authoritative audit.
          set -o pipefail
          lake build FormalConjectures.OEIS.«343881» 2>&1 | tee build.log
          cat > A343881Audit.lean <<'EOF'
          import FormalConjectures.OEIS.«343881»
          #print axioms OeisA343881.conjecture
          EOF
          lake env lean A343881Audit.lean 2>&1 | tee axioms.log
          if grep -q 'sorryAx' axioms.log; then
            echo 'Unexpected sorryAx in theorem dependencies'
            exit 1
          fi
      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oeis-a343881-audit-logs
          path: |
            build.log
            axioms.log
