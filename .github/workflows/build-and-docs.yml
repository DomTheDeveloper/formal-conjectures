name: Build Lean project and deploy docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write

concurrency:
  group: a226247-focused-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Focused A226247 Lean audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install elan
        shell: bash
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get olean cache
        run: |
          lake exe cache unpack
          lake exe cache get

      - name: Build exact A226247 module
        id: lean
        shell: bash
        run: |
          set +e
          set -o pipefail
          lake --wfail build 'FormalConjectures.OEIS.«226247»' \
            2>&1 | tee a226247-focused.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload exact transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a226247-focused-transcript
          path: a226247-focused.log
          if-no-files-found: warn

      - name: Post compiler excerpt
        if: always()
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.lean.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('a226247-focused.log', 'utf8'); } catch (_) {}
            const lines = log.split(/\r?\n/);
            const selected = new Set();
            for (let i = 0; i < lines.length; i++) {
              if (/error:|unsolved goals|failed to build|unknown identifier|type mismatch|invalid field|application type mismatch/i.test(lines[i])) {
                for (let j = Math.max(0, i - 6); j <= Math.min(lines.length - 1, i + 10); j++) selected.add(j);
              }
            }
            let excerpt = selected.size
              ? [...selected].sort((a, b) => a - b).map(i => lines[i]).join('\n')
              : lines.slice(-180).join('\n');
            excerpt = excerpt.slice(-55000);
            const ok = process.env.EXIT_CODE === '0';
            const body = [
              `## Focused A226247 Lean audit: ${ok ? 'PASS' : 'FAIL'}`,
              '',
              `Pinned toolchain: \`${fs.readFileSync('lean-toolchain', 'utf8').trim()}\``,
              `Command: \`lake --wfail build 'FormalConjectures.OEIS.«226247»'\``,
              '',
              '```text',
              excerpt || '(no output)',
              '```'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Enforce compiler result
        if: steps.lean.outputs.exit_code != '0'
        run: exit 1
