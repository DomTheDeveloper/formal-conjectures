name: WOWII 145 standalone pinned Lean audit

on:
  push:
    branches:
      - '*-webtest'

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build exact standalone project and record audit
        run: |
          mkdir -p verification
          set +e
          cd Proofs/WOW145
          lake update > ../../verification/lean145.log 2>&1
          update_status=$?
          if [ "$update_status" -eq 0 ]; then
            lake build >> ../../verification/lean145.log 2>&1
            build_status=$?
          else
            build_status=$update_status
          fi
          if [ "$build_status" -eq 0 ]; then
            lake env lean WOW145/GraphConjecture145Proof.lean >> ../../verification/lean145.log 2>&1
            lean_status=$?
          else
            lean_status=$build_status
          fi
          cd ../..
          echo "update_status=$update_status" > verification/status.txt
          echo "build_status=$build_status" >> verification/status.txt
          echo "lean_status=$lean_status" >> verification/status.txt
          cat verification/lean145.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/lean145.log verification/status.txt Proofs/WOW145/lake-manifest.json
          git commit -m "Record standalone Lean 145 audit [skip ci]" || true
          git push
          exit $lean_status
