name: Geode5 ARM exact audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/Arxiv/2508.10245/Geode5Proof/**'
      - 'FormalConjectures/Arxiv/2508.10245/Geode5.lean'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: geode5-arm-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  exact:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Reject placeholders
        run: '! grep -RInE ''\b(sorry|admit)\b'' FormalConjectures/Arxiv/2508.10245/Geode5Proof'
      - name: Install Lean 4.27
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0
      - name: Fetch cache
        run: lake exe cache get
      - name: Compile current bound stack
        id: compile
        continue-on-error: true
        run: |
          set -o pipefail
          lake env lean -DwarningAsError=true \
            FormalConjectures/Arxiv/2508.10245/Geode5Proof/AbsoluteBound.lean \
            2>&1 | tee /tmp/geode5-arm.log
      - name: Report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.compile.outcome }}
        run: |
          {
            echo '## Geode5 ARM exact audit'
            echo
            echo "Head: \`${{ github.event.pull_request.head.sha }}\`"
            echo "Result: **${OUTCOME}**"
            echo
            echo '```text'
            tail -n 160 /tmp/geode5-arm.log 2>/dev/null || true
            echo '```'
          } >/tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file /tmp/comment.md
      - name: Enforce
        if: steps.compile.outcome != 'success'
        run: exit 1
