name: Quantum Google statement audit

on:
  pull_request:
    branches:
      - upstream/quantum-gdm-base-20260722

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true
      - name: Build modified Google statement module
        run: lake build FormalConjectures.Paper.MonochromaticQuantumGraph
