name: Apply final A261865 foundation repairs

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-3.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proof branch
        uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          sq = 'FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean'
          replace_once(sq,
              '      a.factorization p + b.factorization p = (a * b).factorization p := by\n'
              '        simpa only [Pi.add_apply] using\n'
              '          congrFun (factorization_mul ha.ne_zero hb.ne_zero).symm p\n',
              '      a.factorization p + b.factorization p = (a * b).factorization p := by\n'
              '        have h := congrArg (fun f : ℕ →₀ ℕ => f p)\n'
              '          (factorization_mul ha.ne_zero hb.ne_zero).symm\n'
              '        simpa using h\n')

          torus = 'FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean'
          replace_once(torus,
              '    map_one, one_mul, Pi.zero_apply, neg_zero, zero_add, eq_comm] using h\n',
              '    map_one, one_mul, mul_one, Pi.zero_apply, neg_zero, zero_add, eq_comm] using h\n')

          Path('.github/workflows/a261865-one-shot-repair-3.yml').unlink()
          PY

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/NumberTheory/SquarefreeRadical.lean \
                  FormalConjecturesForMathlib/Analysis/Equidistribution/UnitAddTorus.lean \
                  .github/workflows/a261865-one-shot-repair-3.yml
          git commit -m 'Close remaining A261865 foundation errors'
          git push origin HEAD:a261865-research
