name: Chomp native proof audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: chomp-native-proof-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lean:
    if: startsWith(github.head_ref, 'ci/chomp-native-final-audit')
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout immutable Chomp proof commit
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 1136ebda2f789e38496432818b7f6505ef1ceb12
      - name: Confirm immutable source
        shell: bash
        run: test "$(git rev-parse HEAD)" = "1136ebda2f789e38496432818b7f6505ef1ceb12"
      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Get Mathlib cache
        shell: bash
        run: lake exe cache get
      - name: Compile exact Lean-native Chomp checker
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/time -v lake build FormalConjectures.Paper.ChompThreeOpeningsNative \
            2>&1 | tee chomp-native-proof.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chomp-native-proof-1136ebd-log
          path: chomp-native-proof.log
          if-no-files-found: warn
