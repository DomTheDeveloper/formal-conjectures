name: Chomp native proof audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/Paper/ChompThreeOpeningsNative.lean'
      - '.github/workflows/chomp-native-proof-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chomp-native-proof-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lean:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile native Chomp checker
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/time -v lake lean FormalConjectures/Paper/ChompThreeOpeningsNative.lean \
            2>&1 | tee chomp-native-proof.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chomp-native-proof-log
          path: chomp-native-proof.log
          if-no-files-found: warn
