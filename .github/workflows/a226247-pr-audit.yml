name: A226247 PR audit

on:
  pull_request_target:
    branches: [main]
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  issues: write

concurrency:
  group: a226247-pr-audit
  cancel-in-progress: true

jobs:
  lean:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'solve-a226247-1000' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile A226247 with warnings as errors
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lake env lean -DwarningAsError=true FormalConjectures/OEIS/226247.lean \
            2>&1 | tee a226247-audit.log
      - name: Report exact compiler result
        if: always()
        uses: actions/github-script@v7
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('a226247-audit.log', 'utf8'); } catch (_) {}
            const lines = log.split(/\r?\n/);
            const selected = new Set();
            for (let i = 0; i < lines.length; i++) {
              if (/error:|unsolved goals|failed to build|unknown identifier|type mismatch|invalid field|application type mismatch|declaration uses 'sorry'/i.test(lines[i])) {
                for (let j = Math.max(0, i - 6); j <= Math.min(lines.length - 1, i + 12); j++) selected.add(j);
              }
            }
            let excerpt = selected.size
              ? [...selected].sort((a, b) => a - b).map(i => lines[i]).join('\n')
              : lines.slice(-180).join('\n');
            excerpt = excerpt.slice(-55000);
            const passed = process.env.COMPILE_OUTCOME === 'success';
            const body = [
              '<!-- a226247-lean-audit -->',
              `## A226247 targeted Lean audit: **${passed ? 'PASS' : 'FAIL'}**`,
              '',
              `Audited commit: \`${context.payload.pull_request.head.sha}\``,
              'Command: `lake env lean -DwarningAsError=true FormalConjectures/OEIS/226247.lean`',
              '',
              '```text',
              excerpt || '(no compiler output)',
              '```'
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const prior = comments.find(c => c.body && c.body.includes('<!-- a226247-lean-audit -->'));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      - name: Enforce compiler result
        if: steps.compile.outcome != 'success'
        run: exit 1
