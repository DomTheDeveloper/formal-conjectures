name: C217 internal proof diagnostics

on:
  push:
    branches:
      - agent/c217-proof
  pull_request:
    branches:
      - agent/c217-base

permissions:
  contents: write

jobs:
  diagnostic:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout internal proof branch
        uses: actions/checkout@v6
        with:
          ref: agent/c217-proof
          fetch-depth: 0

      - name: Run deterministic C217 diagnostics
        run: |
          set -euxo pipefail
          mkdir -p C217
          python3 scripts/c217_enumerate_sequences.py > C217/generated_low_delta_sequences.md
          cat C217/generated_low_delta_sequences.md

      - name: Commit deterministic output
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add C217/generated_low_delta_sequences.md
          git diff --cached --quiet && exit 0
          git commit -m 'chore(C217): record exact low-degree remainder'
          git push origin HEAD:agent/c217-proof
