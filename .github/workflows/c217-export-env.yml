name: Export C217 Lean environment

on:
  push:
    branches:
      - agent/c217-proof
  pull_request:
    branches:
      - agent/c217-base

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact proof branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib binary cache
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Record untouched C217 baseline diagnostics
        run: |
          set +e
          set -o pipefail
          lake env lean FormalConjectures/WrittenOnTheWallII/GraphConjecture217.lean \
            2>&1 | tee c217-baseline.log
          echo "baseline_exit_code=${PIPESTATUS[0]}" | tee -a c217-baseline.log
          exit 0

      - name: Export and split exact local checker environment
        run: |
          set -euxo pipefail
          mkdir -p /tmp/c217-export chunks
          cp -a "$HOME/.elan" /tmp/c217-export/elan
          rsync -a \
            --exclude '.git' \
            --exclude 'docbuild/.lake' \
            --exclude '_deploy' \
            --exclude '_literate_html' \
            ./ /tmp/c217-export/formal-conjectures/
          tar -I 'zstd -T0 -3' -cf c217-lean-env.tar.zst -C /tmp/c217-export .
          sha256sum c217-lean-env.tar.zst > chunks/c217-lean-env.tar.zst.sha256
          cp c217-baseline.log chunks/
          split -b 350M -d -a 2 c217-lean-env.tar.zst chunks/c217-lean-env.part-
          ls -lh chunks
          sha256sum chunks/c217-lean-env.part-* > chunks/PART_SHA256SUMS
          test "$(find chunks -name 'c217-lean-env.part-*' | wc -l)" -le 8
          for n in 00 01 02 03 04 05 06 07; do
            test -f "chunks/c217-lean-env.part-$n" || truncate -s 0 "chunks/c217-lean-env.part-$n"
          done

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-metadata
          path: |
            chunks/c217-lean-env.tar.zst.sha256
            chunks/PART_SHA256SUMS
            chunks/c217-baseline.log
          compression-level: 0
          retention-days: 1

      - name: Upload part 00
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-00
          path: chunks/c217-lean-env.part-00
          compression-level: 0
          retention-days: 1
      - name: Upload part 01
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-01
          path: chunks/c217-lean-env.part-01
          compression-level: 0
          retention-days: 1
      - name: Upload part 02
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-02
          path: chunks/c217-lean-env.part-02
          compression-level: 0
          retention-days: 1
      - name: Upload part 03
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-03
          path: chunks/c217-lean-env.part-03
          compression-level: 0
          retention-days: 1
      - name: Upload part 04
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-04
          path: chunks/c217-lean-env.part-04
          compression-level: 0
          retention-days: 1
      - name: Upload part 05
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-05
          path: chunks/c217-lean-env.part-05
          compression-level: 0
          retention-days: 1
      - name: Upload part 06
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-06
          path: chunks/c217-lean-env.part-06
          compression-level: 0
          retention-days: 1
      - name: Upload part 07
        uses: actions/upload-artifact@v4
        with:
          name: c217-env-part-07
          path: chunks/c217-lean-env.part-07
          compression-level: 0
          retention-days: 1
