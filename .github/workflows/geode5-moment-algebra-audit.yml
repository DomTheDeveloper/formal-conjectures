name: Geode5 moment algebra audit

on:
  pull_request_target:
    branches: [main]
    types: [labeled, reopened, synchronize]

permissions:
  contents: read

jobs:
  lean:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit-geode5-crt-proof' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 symbolic recurrence algebra
        run: |
          lake env lean -DwarningAsError=true \
            FormalConjectures/Arxiv/2508.10245/Geode5Proof/MomentAlgebra.lean
