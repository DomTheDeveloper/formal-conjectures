name: Geode5 moment algebra audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/geode5-moment-algebra-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Geode5 audit branch
        uses: actions/checkout@v4
        with:
          ref: audit-geode5-crt-proof
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 symbolic recurrence algebra
        run: |
          lake env lean -DwarningAsError=true \
            FormalConjectures/Arxiv/2508.10245/Geode5Proof/MomentAlgebra.lean
