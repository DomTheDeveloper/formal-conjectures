name: Restricted-run tableaux PR audit

on:
  pull_request_target:
    branches: [main]
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  lean:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'proof/restricted-run-tableaux-reduction' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile finite model
        run: lake env lean FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableaux.lean
      - name: Compile proof reduction
        run: lake env lean FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableauxReduction.lean
      - name: Compile conjecture statement
        run: lake env lean FormalConjectures/Arxiv/RestrictedRunTableaux.lean
