name: Verify complete WOWII 143 proof

on:
  push:
    branches:
      - merge/wowii143-full-proof
    paths:
      - '.github/workflows/import-wowii143-proof.yml'
      - 'WOWII/GraphConjecture143*.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture143.lean'
  pull_request:
    paths:
      - '.github/workflows/import-wowii143-proof.yml'
      - 'WOWII/GraphConjecture143*.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture143.lean'

permissions:
  contents: write

concurrency:
  group: wowii143-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: merge/wowii143-full-proof

      - name: Remove archived catalog import cycle
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('WOWII/GraphConjecture143Proof.lean')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'import FormalConjectures.WrittenOnTheWallII.GraphConjecture143',
              'import FormalConjectures.Util.ProblemImports',
              1)
          path.write_text(text, encoding='utf-8')
          PY
          if ! git diff --quiet -- WOWII/GraphConjecture143Proof.lean; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add WOWII/GraphConjecture143Proof.lean
            git commit -m "Remove WOWII 143 catalog import cycle"
            git push origin HEAD:merge/wowii143-full-proof
          fi

      - name: Install Lean
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get >/dev/null

      - name: Reject proof holes
        shell: bash
        run: |
          if grep -RInE '\b(sorry|admit)\b|^[[:space:]]*axiom[[:space:]]' WOWII/GraphConjecture143*.lean; then
            echo "Proof hole or custom axiom found"
            exit 1
          fi

      - name: Compile exact catalog theorem
        shell: bash
        run: lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture143

      - name: Audit exact theorem axioms
        shell: bash
        run: |
          cat > WOWII143FinalAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture143
          #check WrittenOnTheWallII.GraphConjecture143.conjecture143
          #print axioms WrittenOnTheWallII.GraphConjecture143.conjecture143
          EOF
          lake env lean WOWII143FinalAudit.lean 2>&1 | tee wowii143-final-audit.log
          if grep -E 'sorryAx|admitAx|Lean\.trustCompiler|Lean\.ofReduceBool' wowii143-final-audit.log; then
            echo "Unexpected non-kernel axiom detected"
            exit 1
          fi

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii143-final-audit
          path: wowii143-final-audit.log
          if-no-files-found: warn
