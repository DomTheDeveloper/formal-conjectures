name: W320 PR kernel audit

on:
  pull_request_target:
    branches: [main]
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  statuses: write

concurrency:
  group: w320-pr-kernel-audit
  cancel-in-progress: true

jobs:
  verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/w320-kernel-proof' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Build W(3,20) proof
        run: lake build FormalConjectures.GreensOpenProblems.Green14FastKernel20
      - name: Audit theorem axioms
        shell: bash
        run: |
          cat > /tmp/W320Axioms.lean <<'EOF'
          import FormalConjectures.GreensOpenProblems.Green14FastKernel20
          #print axioms Green14.FastKernel.valid_20
          #print axioms Green14.FastKernel.W_3_20_lower_fast
          EOF
          lake env lean /tmp/W320Axioms.lean 2>&1 | tee w320-axioms.log
          if grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' w320-axioms.log; then
            exit 1
          fi
      - name: Publish audit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: ok ? 'success' : 'failure',
              context: 'w320/kernel-audit',
              description: ok ? 'Lean build and axiom audit passed' : 'Lean build or axiom audit failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
