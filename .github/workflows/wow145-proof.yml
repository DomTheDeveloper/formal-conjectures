name: Verify WOWII 145 proof

on:
  push:
    branches:
      - agent/wowii-145-proof
    paths-ignore:
      - WOW145Proof/lean-ci.log
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies and cache
        working-directory: WOW145Proof
        run: |
          lake update
          lake exe cache get
          lake build wow_146:WOW146

      - name: Verify proof and axiom audit
        id: verify
        working-directory: WOW145Proof
        shell: bash
        run: |
          set +e
          {
            echo '$ lake env lean -DwarningAsError=true WOW145/Conjecture145.lean'
            lake env lean -DwarningAsError=true WOW145/Conjecture145.lean
          } > lean-ci.log 2>&1
          status=$?
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-ci.log
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wow145-lean-log-${{ github.run_id }}
          path: WOW145Proof/lean-ci.log

      - name: Publish compiler log on branch pushes
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f WOW145Proof/lean-ci.log
          git commit -m "ci: publish WOWII 145 Lean log" || true
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Fail when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
