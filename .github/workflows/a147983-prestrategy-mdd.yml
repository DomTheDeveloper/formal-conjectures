name: OEIS A147983 separated symbolic strategy experiment

on:
  pull_request:
    branches: [main]
    paths:
      - 'ProofArtifacts/OEIS/A147983/chomp_export_p_ranks.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_p_mdd_serialize.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_prestrategy_mdd_compact.cpp'
      - '.github/workflows/a147983-prestrategy-mdd.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a147983-prestrategy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Build exact generators and memory-compact checker
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set -euo pipefail
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_export_p_ranks.cpp -o chomp_export_p_ranks
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_p_mdd_serialize.cpp -o chomp_p_mdd_serialize
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_prestrategy_mdd_compact.cpp -o chomp_prestrategy_mdd_compact
      - name: Regenerate exact P stream and MDD
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/time -v ./chomp_export_p_ranks 10 42 p10x42.bin \
            > export.stdout 2> export.stderr
          grep -F 'P=107342138 prefixes=3042311754 last_rank=15820013305' export.stderr
          /usr/bin/time -v ./chomp_p_mdd_serialize p10x42.bin p10x42.mdd \
            > mdd.stdout 2> mdd.stderr
          grep -F 'words=107342138 total_nodes=16906422 total_transitions=96754877' mdd.stdout
      - name: Build exact reply strategy and replay every witness
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set -o pipefail
          /usr/bin/time -v ./chomp_prestrategy_mdd_compact p10x42.mdd 50000000 20000000 \
            > prestrategy-compact.stdout 2> prestrategy-compact.stderr
      - name: Upload experiment transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a147983-separated-prestrategy-compact
          path: |
            ProofArtifacts/OEIS/A147983/prestrategy-compact.stdout
            ProofArtifacts/OEIS/A147983/prestrategy-compact.stderr
            ProofArtifacts/OEIS/A147983/export.stderr
            ProofArtifacts/OEIS/A147983/mdd.stdout
          if-no-files-found: warn
