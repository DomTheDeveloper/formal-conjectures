name: Apply clean quantum all-colors GDM patch

on:
  pull_request:
    branches:
      - upstream/quantum-gdm-base-20260722

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/quantum-n6-all-colors-gdm-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/quantum-n6-all-colors-gdm-clean
          fetch-depth: 0

      - name: Apply four declaration updates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('FormalConjectures/Paper/MonochromaticQuantumGraph.lean')
          lines = path.read_text().splitlines()
          proof = 'https://github.com/DomTheDeveloper/formal-conjectures/blob/a76f24bc20db67b27c445faa39571cf5bc03990e/QuantumGraphColorRestriction.lean'
          targets = {
              'eqSystem6_no_solution_d5_int': 'L163-L166',
              'eqSystem6_no_solution_ge3_int': 'L169-L174',
              'eqSystem6_no_solution_d5_trinary_int': 'L177-L182',
              'eqSystem6_no_solution_ge3_trinary_int': 'L185-L192',
          }

          for theorem, anchor in targets.items():
              theorem_line = next((i for i, line in enumerate(lines)
                                   if line.strip() == f'theorem {theorem} :'), None)
              if theorem_line is None:
                  raise SystemExit(f'missing theorem: {theorem}')

              attribute_line = next((i for i in range(theorem_line - 1, max(-1, theorem_line - 12), -1)
                                     if lines[i].startswith('@[category research ')), None)
              if attribute_line is None or 'open' not in lines[attribute_line]:
                  raise SystemExit(f'missing open category for {theorem}')

              lines[attribute_line:attribute_line + 1] = [
                  '@[category research solved, AMS 5 14 81, formal_proof using formal_conjectures at',
                  f'"{proof}#{anchor}"]',
              ]
              theorem_line += 1

              answer_line = next((i for i in range(theorem_line + 1, min(len(lines), theorem_line + 8))
                                  if 'answer(sorry)' in lines[i]), None)
              if answer_line is None:
                  raise SystemExit(f'missing answer(sorry) for {theorem}')
              lines[answer_line] = lines[answer_line].replace('answer(sorry)', 'answer(True)')

          path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit clean statement-only patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjectures/Paper/MonochromaticQuantumGraph.lean
          git commit -m 'Solve N=6 integer quantum graph cases for all D ≥ 3'
          git push origin HEAD:agent/quantum-n6-all-colors-gdm-clean
