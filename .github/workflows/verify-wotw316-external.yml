name: Verify WotW316 external proof

on:
  push:
    branches:
      - agent/wotw316-verification
    paths:
      - ".github/workflows/verify-wotw316-external.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/verify-wotw316-external.yml"
  workflow_dispatch:

concurrency:
  group: wotw316-external-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out proof branch
        uses: actions/checkout@v4
        with:
          repository: DomTheDeveloper/crl
          ref: agent/wotw316-proof
          path: crl
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Guard against placeholders
        run: "! grep -RnE '(^|[[:space:]])(sorry|admit|native_decide)([[:space:]]|$)' crl/proofs/lean/WotW316/*.lean"
      - name: Resolve dependencies
        working-directory: crl/proofs/lean/WotW316
        run: lake update
      - name: Fetch cache
        working-directory: crl/proofs/lean/WotW316
        run: lake exe cache get || echo "cache miss"
      - name: Build and kernel-check
        working-directory: crl/proofs/lean/WotW316
        shell: bash
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wotw316-external-build-log
          path: crl/proofs/lean/WotW316/build.log
          if-no-files-found: warn
      - name: Reject sorryAx
        if: success()
        working-directory: crl/proofs/lean/WotW316
        run: |
          if grep -q "sorryAx" build.log; then
            echo "::error::Proof depends on sorryAx"; exit 1
          fi
