name: Verify WOWII 109

on:
  pull_request:
    paths:
      - "FormalConjectures/WrittenOnTheWallII/GraphConjecture109.lean"
      - ".github/workflows/verify-wowii109.yml"

permissions:
  contents: read

jobs:
  verify-wowii109:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install elan
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get

      - name: Compile Conjecture 109
        shell: bash
        run: lake env lean FormalConjectures/WrittenOnTheWallII/GraphConjecture109.lean
