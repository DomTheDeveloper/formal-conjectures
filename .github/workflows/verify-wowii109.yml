name: Verify WOWII 109

on:
  pull_request:
    paths:
      - "FormalConjectures/WrittenOnTheWallII/GraphConjecture109.lean"
      - ".github/workflows/verify-wowii109.yml"

permissions:
  contents: read

jobs:
  verify-wowii109:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Install elan
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get >/dev/null

      - name: Compile Conjecture 109
        id: compile
        shell: bash
        run: |
          set +e
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture109 > lean-wowii109.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Axiom audit
        if: steps.compile.outputs.status == '0'
        shell: bash
        run: |
          cat > WOWII109AxiomAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture109
          #print axioms WrittenOnTheWallII.GraphConjecture109.conjecture109
          EOF
          lake env lean WOWII109AxiomAudit.lean > wowii109-axioms.log 2>&1
          cat wowii109-axioms.log
          if grep -E 'sorryAx|admitAx|Lean\.trustCompiler|Lean\.ofReduceBool' wowii109-axioms.log; then
            echo "Unexpected non-kernel axiom detected"
            exit 1
          fi

      - name: Source placeholder audit
        if: steps.compile.outputs.status == '0'
        shell: bash
        run: |
          if grep -nE '\b(sorry|admit)\b' FormalConjectures/WrittenOnTheWallII/GraphConjecture109.lean; then
            echo "Placeholder token detected"
            exit 1
          fi

      - name: Upload Lean diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-wowii109-audit
          path: |
            lean-wowii109.log
            wowii109-axioms.log
          if-no-files-found: warn

      - name: Fail on Lean errors
        if: steps.compile.outputs.status != '0'
        shell: bash
        run: |
          cat lean-wowii109.log
          exit 1
