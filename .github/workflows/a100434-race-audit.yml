name: A100434 runner race audit

on:
  push:
    branches: [audit/a100434-stable-39dd]
    paths:
      - '.github/workflows/a100434-race-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/a100434-race-audit.yml'

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/formal-conjectures
          ref: 39dd7e1a393510e89469a4365aceec13f704e839
          fetch-depth: 1

      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: a100434-race-${{ matrix.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}
          restore-keys: a100434-race-${{ matrix.os }}-

      - name: Get Mathlib cache
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            lake exe cache get && exit 0
            sleep 10
          done
          exit 1

      - name: Build utility dependency
        run: |
          set -o pipefail
          lake build FormalConjecturesUtil 2>&1 | tee a100434-dependency.log

      - name: Compile exact proof
        run: |
          set -o pipefail
          lake env lean FormalConjectures/OEIS/100434.lean 2>&1 | tee a100434-compile.log

      - name: Audit theorem axioms
        run: |
          cat > /tmp/A100434Axioms.lean <<'EOF'
          import FormalConjectures.OEIS.«100434»
          #print axioms OeisA100434.a100434_auxiliary_identities
          EOF
          set -o pipefail
          lake env lean /tmp/A100434Axioms.lean 2>&1 | tee a100434-axioms.log
          ! grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' a100434-axioms.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a100434-${{ matrix.os }}-${{ github.run_id }}
          path: |
            a100434-dependency.log
            a100434-compile.log
            a100434-axioms.log
          if-no-files-found: warn