name: Restricted-run current-head audit

on:
  pull_request:
    branches: [main]
    paths:
      - FormalConjectures/Arxiv/RestrictedRunTableaux.lean
      - FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableaux.lean
      - FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableauxReduction.lean
      - .github/workflows/restricted-run-current-head-audit.yml

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Build current mathematical sources
        run: |
          lake build \
            FormalConjecturesForMathlib.Combinatorics.RestrictedRunTableaux \
            FormalConjecturesForMathlib.Combinatorics.RestrictedRunTableauxReduction \
            FormalConjectures.Arxiv.RestrictedRunTableaux
