name: Close remaining A261865 empirical errors

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-6.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean')
          text = path.read_text()

          def replace_once(old, new):
              global text
              n = text.count(old)
              if n != 1:
                  raise SystemExit(f'expected one match, found {n}: {old!r}')
              text = text.replace(old, new, 1)

          replace_once(
              'private theorem range_nonempty_of_ne_zero {N : ℕ} (hN : N ≠ 0) :\n'
              '    (Finset.range N).Nonempty :=\n'
              '  ⟨0, Finset.mem_range.mpr (Nat.pos_of_ne_zero hN)⟩\n',
              'theorem empiricalRange_nonempty_of_ne_zero {N : ℕ} (hN : N ≠ 0) :\n'
              '    (Finset.range N).Nonempty :=\n'
              '  ⟨0, Finset.mem_range.mpr (Nat.pos_of_ne_zero hN)⟩\n')
          text = text.replace('range_nonempty_of_ne_zero', 'empiricalRange_nonempty_of_ne_zero')

          replace_once(
              'variable [TopologicalSpace Ω] [BorelSpace Ω]\n',
              'variable [PseudoMetricSpace Ω] [BorelSpace Ω]\n')
          replace_once(
              'variable [CompactSpace Ω] [PseudoMetricSpace Ω]\n',
              'variable [CompactSpace Ω]\n')

          replace_once(
              '  have hfint : Integrable (fun n => f (Y n)) p.toMeasure := by\n'
              '    refine (integrable_const ‖f‖).mono ?_ ?_\n'
              '    · exact (measurable_of_countable (fun n => f (Y n))).aestronglyMeasurable\n'
              '    · exact Filter.Eventually.of_forall fun n => f.norm_coe_le_norm (Y n)\n',
              '  have hfint : Integrable (fun n => f (Y n)) p.toMeasure := by\n'
              '    have hc : Integrable (fun _ : ℕ => (‖f‖ : ℂ)) p.toMeasure := integrable_const _\n'
              '    refine hc.mono ?_ ?_\n'
              '    · exact (measurable_of_countable (fun n => f (Y n))).aestronglyMeasurable\n'
              '    · exact Filter.Eventually.of_forall fun n => by\n'
              '        simpa using f.norm_coe_le_norm (Y n)\n')

          replace_once(
              '  exact integral_empiricalProbabilityMeasure Y hN f\n',
              '  exact (integral_empiricalProbabilityMeasure Y hN f).symm\n')

          replace_once(
              '  filter_upwards [eventually_ne_atTop 0] with N hN\n'
              '  rw [empiricalProbabilityMeasure_apply Y hN hA]\n',
              '  filter_upwards [eventually_ne_atTop 0] with N hN\n'
              '  simp only [Function.comp_apply]\n'
              '  rw [empiricalProbabilityMeasure_apply Y hN hA]\n')

          replace_once(
              '    simp [hS]\n',
              '    simp [hS, and_comm]\n')

          path.write_text(text)
          Path('.github/workflows/a261865-one-shot-repair-6.yml').unlink()
          PY

      - name: Commit repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean \
                  .github/workflows/a261865-one-shot-repair-6.yml
          git commit -m 'Close remaining A261865 empirical compatibility errors'
          git push origin HEAD:a261865-research
