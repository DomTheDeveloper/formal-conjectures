name: C2 focused Lean audit

on:
  pull_request:
    branches:
      - audit/c2-macos-base-2026-07-22

permissions:
  contents: read

jobs:
  audit:
    if: contains(github.event.pull_request.title, 'C2')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true
      - name: Compile C2 proof layers and audit axioms
        shell: bash
        run: |
          set -o pipefail
          lake build FormalConjecturesUtil
          files=(
            ProofAudit/2_counting_core.lean
            ProofAudit/2_local_choice.lean
            ProofAudit/2_double_count.lean
            ProofAudit/2_positive.lean
            ProofAudit/2_average_pair.lean
            ProofAudit/2_ls_bridge.lean
            ProofAudit/2_double_star.lean
            ProofAudit/2_double_star_degrees.lean
            ProofAudit/2_tree_leaves.lean
            ProofAudit/2_tree_bound.lean
            ProofAudit/2_complete.lean
          )
          : > c2-focused.log
          for file in "${files[@]}"; do
            echo "=== $file ===" | tee -a c2-focused.log
            lake env lean "$file" 2>&1 | tee -a c2-focused.log
          done
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c2-focused-audit-log
          path: c2-focused.log
          if-no-files-found: warn
