name: A263135 macOS targeted audit

on:
  pull_request:
    paths:
      - 'FormalConjectures/OEIS/263135.lean'
      - '.github/workflows/a263135-macos-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore mathlib cache
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lake exe cache get
      - name: Check A263135
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lake env lean FormalConjectures/OEIS/263135.lean
