name: Check C217 focused backport

on:
  pull_request:
    branches:
      - agent/c217-audit-base
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore repository Mathlib cache
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Reject proof holes and trusted computation shortcuts
        run: |
          set -euxo pipefail
          file=FormalConjecturesForMathlib/Combinatorics/SimpleGraph/HamiltonianExtras.lean
          if grep -nE '\b(sorry|admit|native_decide)\b|Lean\.trustCompiler|Lean\.ofReduceBool' "$file"; then
            echo 'Forbidden proof shortcut found.' >&2
            exit 1
          fi

      - name: Compile helper module and audit axioms
        id: lean
        continue-on-error: true
        run: |
          set -o pipefail
          file=FormalConjecturesForMathlib/Combinatorics/SimpleGraph/HamiltonianExtras.lean
          lake env lean "$file" 2>&1 | tee c217-focused-audit.log

      - name: Publish compact Lean diagnostics
        if: steps.lean.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Focused Lean 4.27.0 diagnostics'
            echo
            echo '```text'
            grep -E -A3 -B1 'error:|declaration uses|unknown (constant|identifier)|type mismatch|application type mismatch|invalid field' c217-focused-audit.log | tail -n 180
            echo '```'
          } > c217-diagnostics.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file c217-diagnostics.md

      - name: Enforce compile and axiom audit
        run: |
          test "${{ steps.lean.outcome }}" = success
          if grep -nE 'sorryAx|Lean\.trustCompiler|Lean\.ofReduce|Lean\.ofReduceBool' c217-focused-audit.log; then
            echo 'Forbidden axiom found in audit output.' >&2
            exit 1
          fi

      - name: Upload focused audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c217-focused-audit-log
          path: c217-focused-audit.log
          compression-level: 0
          retention-days: 7
