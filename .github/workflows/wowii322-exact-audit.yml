name: Exact WOWII 322 kernel audit

on:
  pull_request:
    paths:
      - FormalConjectures/WrittenOnTheWallII/GraphConjecture322.lean
      - .github/workflows/wowii322-exact-audit.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-wowii322-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out audit tree
        uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download Mathlib cache
        shell: bash
        run: lake exe cache get

      - name: Compile exact theorem module
        shell: bash
        run: |
          set -euo pipefail
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture322 2>&1 \
            | tee wowii322-build.log

      - name: Reject proof holes
        shell: bash
        run: |
          set -euo pipefail
          if grep -InE '^[[:space:]]*(axiom|sorry|admit)([[:space:]]|$)|:= by[[:space:]]+(sorry|admit)([[:space:]]|$)|native_decide|^[[:space:]]*opaque[[:space:]]' \
            FormalConjectures/WrittenOnTheWallII/GraphConjecture322.lean; then
            exit 1
          fi

      - name: Audit exact theorem axioms
        shell: bash
        run: |
          set -euo pipefail
          cat > AuditWOWII322.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture322
          #check WrittenOnTheWallII.GraphConjecture322.conjecture322
          #print axioms WrittenOnTheWallII.GraphConjecture322.conjecture322
          EOF
          lake env lean AuditWOWII322.lean 2>&1 | tee wowii322-axioms.log
          if grep -q sorryAx wowii322-axioms.log; then
            echo 'conjecture322 depends on sorryAx' >&2
            exit 1
          fi
          grep -F 'WrittenOnTheWallII.GraphConjecture322.conjecture322' wowii322-axioms.log

      - name: Upload verification transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii322-exact-audit
          path: |
            wowii322-build.log
            wowii322-axioms.log
          if-no-files-found: warn
