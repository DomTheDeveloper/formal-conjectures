name: Repair A263135 corners once

on:
  push:
    branches: [dtd/oeis-a263135-scd-scratch]
    paths: ['.github/workflows/repair-a263135-corners-once.yml']

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dtd/oeis-a263135-scd-scratch
          fetch-depth: 0
      - name: Apply corner compatibility repairs
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('Scratch/A263135PatchCorners.lean')
          text = p.read_text()

          text = text.replace('Finset.Nat.antidiagonal', 'Finset.antidiagonal')

          old = '''private theorem lower_corner_sides_disjoint (b : ℕ) :
    Disjoint (lowerPairs b ×ˢ {false}) (lowerPairs (b - 1) ×ˢ {true}) := by
  rw [Finset.disjoint_left]
  intro x hx hy
  have hf := (Finset.mem_product.mp hx).2
  have ht := (Finset.mem_product.mp hy).2
  simp at hf ht'''
          new = '''private theorem lower_corner_sides_disjoint (b : ℕ) :
    Disjoint (lowerPairs b ×ˢ {false}) (lowerPairs (b - 1) ×ˢ {true}) := by
  rw [Finset.disjoint_left]
  intro x hx hy
  have hf : x.2 = false := by simpa using (Finset.mem_product.mp hx).2
  have ht : x.2 = true := by simpa using (Finset.mem_product.mp hy).2
  exact Bool.noConfusion (hf.symm.trans ht)'''
          if text.count(old) != 1:
              raise SystemExit('lower_corner_sides_disjoint block mismatch')
          text = text.replace(old, new, 1)

          old = '''  · have hb1 : 1 ≤ b := Nat.one_le_iff_ne_zero.mpr hb
    have hgauss1 := Finset.sum_range_id_mul_two b
    have hgauss2 := Finset.sum_range_id_mul_two (b - 1)
    simp only [Finset.sum_add_distrib, Finset.sum_const, Finset.card_range,
      Nat.nsmul_eq_mul, mul_one] at *
    nlinarith'''
          new = '''  · obtain ⟨k, rfl⟩ : ∃ k, b = k + 1 := by
      exact ⟨b - 1, by omega⟩
    have hgauss1 := Finset.sum_range_id_mul_two (k + 1)
    have hgauss2 := Finset.sum_range_id_mul_two k
    simp only [Finset.sum_add_distrib, Finset.sum_const, Finset.card_range,
      Nat.nsmul_eq_mul, mul_one] at *
    nlinarith'''
          if text.count(old) != 1:
              raise SystemExit('card lower corner block mismatch')
          text = text.replace(old, new, 1)

          old = '''  rcases x with ⟨⟨i, j⟩, side⟩
  simp [rankBox] at hx ⊢
  omega'''
          new = '''  rcases x with ⟨⟨i, j⟩, side⟩
  simp [rankBox, reflectTriple] at hx ⊢
  rcases hx with ⟨hi, hj⟩
  constructor <;> omega'''
          if text.count(old) != 1:
              raise SystemExit('reflectTriple_mem_box block mismatch')
          text = text.replace(old, new, 1)

          old = '''  have htarget := lowerCornerTriples_eq_filter_rankBox A B b hbA hbB
  rw [← htarget, ← card_lowerCornerTriples b]
  apply Finset.card_bij (fun x hx => reflectTriple A B x)'''
          new = '''  rw [← card_lowerCornerTriples b]
  apply Finset.card_bij (fun x hx => reflectTriple A B x)'''
          if text.count(old) != 1:
              raise SystemExit('upper corner opening block mismatch')
          text = text.replace(old, new, 1)

          p.write_text(text)
          Path('.github/workflows/repair-a263135-corners-once.yml').unlink()
          PY
      - name: Commit repairs
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Scratch/A263135PatchCorners.lean .github/workflows/repair-a263135-corners-once.yml
          git commit -m 'Repair A263135 corner API compatibility'
          git push origin HEAD:dtd/oeis-a263135-scd-scratch
