name: Geode5 current proof audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/Arxiv/2508.10245/Geode5Proof/**'
      - 'FormalConjectures/Arxiv/2508.10245/Geode5Defs.lean'
      - 'FormalConjectures/Arxiv/2508.10245/Geode5.lean'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: geode5-current-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  exact:
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Reject actual Lean placeholders
        run: |
          set -euo pipefail
          ! grep -RInE 'by[[:space:]]+(sorry|admit)\b|^[[:space:]]*(sorry|admit)\b' \
            FormalConjectures/Arxiv/2508.10245/Geode5Proof \
            FormalConjectures/Arxiv/2508.10245/Geode5.lean
      - name: Install Lean 4.27
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.27.0
      - name: Fetch cache
        run: lake exe cache get
      - name: Build final theorem and audit axioms
        id: compile
        continue-on-error: true
        run: |
          set -o pipefail
          lake build 'FormalConjectures.Arxiv.«2508.10245».Geode5' \
            2>&1 | tee /tmp/geode5-current.log
          cat > Geode5FinalAudit.lean <<'EOF'
          import FormalConjectures.Arxiv.«2508.10245».Geode5
          #print axioms Arxiv.«2508.10245».geode5_1000
          EOF
          lake env lean -DwarningAsError=true Geode5FinalAudit.lean \
            2>&1 | tee -a /tmp/geode5-current.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduceBool|Lean\.ofReduce' /tmp/geode5-current.log; then
            exit 1
          fi
      - name: Report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.compile.outcome }}
        run: |
          {
            echo '## Geode5 final theorem audit'
            echo
            echo "Head: \`${{ github.event.pull_request.head.sha }}\`"
            echo "Target: \`FormalConjectures.Arxiv.«2508.10245».Geode5\`"
            echo "Result: **${OUTCOME}**"
            echo
            echo '```text'
            tail -n 200 /tmp/geode5-current.log 2>/dev/null || true
            echo '```'
          } >/tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file /tmp/comment.md
      - name: Enforce
        if: steps.compile.outcome != 'success'
        run: exit 1
