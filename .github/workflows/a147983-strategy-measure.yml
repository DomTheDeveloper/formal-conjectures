name: OEIS A147983 strategy MDD measurement

on:
  pull_request:
    branches: [main]
    paths:
      - 'ProofArtifacts/OEIS/A147983/chomp_export_p_ranks.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_p_mdd_serialize.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_strategy_mdd.cpp'
      - 'audits/a147983-strategy/**'
      - '.github/workflows/a147983-strategy-measure.yml'
  push:
    branches:
      - proof-artifacts/oeis-a147983-chomp
    paths:
      - 'ProofArtifacts/OEIS/A147983/chomp_export_p_ranks.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_p_mdd_serialize.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_strategy_mdd.cpp'
      - 'audits/a147983-strategy/**'
      - '.github/workflows/a147983-strategy-measure.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a147983-strategy-mdd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ProofArtifacts/OEIS/A147983
    steps:
      - uses: actions/checkout@v4

      - name: Build exact generators
        run: |
          set -euo pipefail
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_export_p_ranks.cpp -o chomp_export_p_ranks
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_p_mdd_serialize.cpp -o chomp_p_mdd_serialize
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_strategy_mdd.cpp -o chomp_strategy_mdd

      - name: Export exact P-position stream through third root
        run: |
          set -euo pipefail
          /usr/bin/time -v ./chomp_export_p_ranks 10 42 p10x42.bin \
            > export.stdout 2> export.stderr
          grep -F 'P=107342138' export.stderr
          grep -F 'last_rank=15820013305' export.stderr

      - name: Build and validate serialized reduced MDD
        run: |
          set -euo pipefail
          /usr/bin/time -v ./chomp_p_mdd_serialize p10x42.bin p10x42.mdd \
            > mdd.stdout 2> mdd.stderr
          grep -F 'words=107342138' mdd.stdout
          grep -F 'total_nodes=16906422' mdd.stdout
          grep -F 'total_transitions=96754877' mdd.stdout

      - name: Measure exact symbolic response closure
        run: |
          set -uo pipefail
          /usr/bin/time -v ./chomp_strategy_mdd p10x42.mdd 500000 \
            > strategy.stdout 2> strategy.stderr
          status=$?
          echo "$status" > strategy.status
          cat strategy.stdout
          cat strategy.stderr >&2
          if [[ $status -eq 1 ]]; then
            echo 'Exact symbolic checker found a response-closure counterexample.' >&2
            exit 1
          fi
          if [[ $status -ne 0 && $status -ne 3 ]]; then
            echo "Unexpected strategy-checker status: $status" >&2
            exit "$status"
          fi
          exit 0

      - name: Write measurement report
        if: always()
        run: |
          {
            echo '# OEIS A147983 response-strategy MDD measurement'
            echo
            echo '## P-rank export'
            tail -n 30 export.stderr || true
            echo
            echo '## Reduced MDD'
            cat mdd.stdout || true
            tail -n 30 mdd.stderr || true
            echo
            echo '## Response closure'
            cat strategy.stdout || true
            cat strategy.stderr || true
            echo
            echo -n 'checker_status='
            cat strategy.status 2>/dev/null || true
          } > STRATEGY_MDD_REPORT.md

      - name: Upload compact report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a147983-strategy-mdd-report
          path: |
            ProofArtifacts/OEIS/A147983/STRATEGY_MDD_REPORT.md
            ProofArtifacts/OEIS/A147983/export.stdout
            ProofArtifacts/OEIS/A147983/export.stderr
            ProofArtifacts/OEIS/A147983/mdd.stdout
            ProofArtifacts/OEIS/A147983/mdd.stderr
            ProofArtifacts/OEIS/A147983/strategy.stdout
            ProofArtifacts/OEIS/A147983/strategy.stderr
            ProofArtifacts/OEIS/A147983/strategy.status
          if-no-files-found: warn