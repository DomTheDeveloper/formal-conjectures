name: VC2 isolated Lean check

on:
  pull_request:
    paths:
      - 'FormalConjectures/Other/VCDimConvexCounterexample.lean'
      - '.github/workflows/vc2-debug.yml'

concurrency:
  group: vc2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Lean toolchain
        shell: pwsh
        run: |
          curl.exe -L --fail --silent --show-error `
            https://github.com/leanprover/elan/releases/latest/download/elan-init.exe `
            -o elan-init.exe
          .\elan-init.exe -y --default-toolchain none
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Get Mathlib cache
        shell: pwsh
        run: lake exe cache get
      - name: Check exact counterexample file
        shell: pwsh
        run: |
          $proof = 'FormalConjectures/Other/VCDimConvexCounterexample.lean'
          if (Select-String -Path $proof -Pattern '\b(sorry|admit|native_decide)\b') {
            throw 'Forbidden proof placeholder or shortcut found.'
          }
          lake env lean $proof
