name: VC2 isolated Lean check

on:
  pull_request:
    paths:
      - 'FormalConjectures/Other/VCDimConvexCounterexample.lean'
      - '.github/workflows/vc2-debug.yml'

concurrency:
  group: vc2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Lean toolchain
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Get Mathlib cache
        run: |
          set -euxo pipefail
          lake exe cache get
      - name: Check exact counterexample file
        run: |
          set -euxo pipefail
          proof='FormalConjectures/Other/VCDimConvexCounterexample.lean'
          if grep -nE '\b(sorry|admit|native_decide|unsafe|axiom|opaque)\b' "$proof"; then
            echo 'Forbidden proof placeholder or shortcut found.' >&2
            exit 1
          fi
          lake env lean "$proof" 2>&1 | tee vc2-lean.log
          ! grep -q 'sorryAx' vc2-lean.log
