name: VC2 isolated Lean check

on:
  pull_request:
    paths:
      - 'FormalConjectures/Other/VCDimConvexCounterexample.lean'
      - '.github/workflows/vc2-debug.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Lean toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Get Mathlib cache
        run: lake exe cache get
      - name: Check exact counterexample file
        run: |
          ! grep -nE '\b(sorry|admit|native_decide)\b' \
            FormalConjectures/Other/VCDimConvexCounterexample.lean
          lake env lean FormalConjectures/Other/VCDimConvexCounterexample.lean
