name: Export A263135 Lean environment

on:
  push:
    branches:
      - dtd/oeis-a263135
    paths:
      - .github/workflows/export-a263135-lean-env.yml
  pull_request:
    paths:
      - .github/workflows/export-a263135-lean-env.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download pinned dependencies and cache
        run: |
          lake exe cache unpack
          lake exe cache get
          lake build FormalConjecturesUtil

      - name: Pack self-contained environment
        run: |
          set -euxo pipefail
          TOOLCHAIN_DIR="$(dirname "$(dirname "$(readlink -f "$(elan which lean)")")")"
          mkdir -p /tmp/a263135-env
          cp -a "$TOOLCHAIN_DIR" /tmp/a263135-env/toolchain
          rsync -a --exclude=.git --exclude=docbuild/.lake --exclude=site/node_modules ./ /tmp/a263135-env/repo/
          tar --zstd -cf a263135-lean-env.tar.zst -C /tmp a263135-env
          ls -lh a263135-lean-env.tar.zst

      - name: Upload environment
        uses: actions/upload-artifact@v4
        with:
          name: a263135-lean-env
          path: a263135-lean-env.tar.zst
          compression-level: 0
          retention-days: 1
