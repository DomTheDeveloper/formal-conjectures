# Dedicated ARM audit lane to avoid congestion from x64 SAT matrices.
name: W320 upper bridge and LRAT kernel V2 audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/GreensOpenProblems/Green14UpperOrderBridge.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14PositiveCertificateBridge.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14CNFEncoding.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14CubeCover.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14NestedCubeCover.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14LRATKernelConversion.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14LRATKernelChecker.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14LRATImport.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14LRATImportSmoke.lean'
      - 'certificates/w320/tiny.lrat'
      - 'scripts/w320/export_lean_cnf.lean'
      - 'scripts/w320/generate_cnf.py'
      - '.github/workflows/w320-upper-bridge-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install repository-pinned Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        run: |
          "$HOME/.elan/bin/lake" exe cache unpack || true
          "$HOME/.elan/bin/lake" exe cache get

      - name: Build semantic, checker, and importer modules
        run: |
          set -o pipefail
          "$HOME/.elan/bin/lake" build \
            FormalConjectures.GreensOpenProblems.Green14UpperOrderBridge \
            FormalConjectures.GreensOpenProblems.Green14PositiveCertificateBridge \
            FormalConjectures.GreensOpenProblems.Green14CNFEncoding \
            FormalConjectures.GreensOpenProblems.Green14CubeCover \
            FormalConjectures.GreensOpenProblems.Green14NestedCubeCover \
            FormalConjectures.GreensOpenProblems.Green14LRATKernelConversion \
            FormalConjectures.GreensOpenProblems.Green14LRATKernelChecker \
            FormalConjectures.GreensOpenProblems.Green14LRATImport \
            FormalConjectures.GreensOpenProblems.Green14LRATImportSmoke \
            2>&1 | tee "$RUNNER_TEMP/w320-upper-build.log"

      - name: Verify Lean and Python CNFs are byte-identical
        run: |
          set -euo pipefail
          "$HOME/.elan/bin/lake" env lean --run scripts/w320/export_lean_cnf.lean \
            > "$RUNNER_TEMP/w320-lean.cnf"
          python3 scripts/w320/generate_cnf.py \
            --output "$RUNNER_TEMP/w320-python.cnf" \
            | tee "$RUNNER_TEMP/w320-python-metadata.log"
          cmp "$RUNNER_TEMP/w320-lean.cnf" "$RUNNER_TEMP/w320-python.cnf"
          sha256sum "$RUNNER_TEMP/w320-lean.cnf" "$RUNNER_TEMP/w320-python.cnf" \
            | tee "$RUNNER_TEMP/w320-cnf-sha256.log"
          grep -q '^p cnf 389 41426$' "$RUNNER_TEMP/w320-lean.cnf"

      - name: Audit axioms
        run: |
          cat > "$RUNNER_TEMP/W320UpperAxioms.lean" <<'EOF'
          import FormalConjectures.GreensOpenProblems.Green14NestedCubeCover
          import FormalConjectures.GreensOpenProblems.Green14LRATImportSmoke
          #print axioms Green14.W_le_of_mem
          #print axioms Green14.W_3_20_eq_389_of_mem
          #print axioms Green14.PositiveCertificateBridge.exists_monoAP_of_hasAP_eq_true
          #print axioms Green14.PositiveCertificateBridge.mem_mixed_of_direct_checks
          #print axioms Green14.CNFEncoding.eval_apAvoidanceCNF_eq_true
          #print axioms Green14.CNFEncoding.W_3_20_eq_389_of_w320CNF_unsat
          #print axioms Green14.CubeCover.w320CNF_unsat_of_all_cubes
          #print axioms Green14.NestedCubeCover.cubeCNF_unsat_of_all_children
          #print axioms Green14.LRATKernelV2.unsat_of_convertK_unsat
          #print axioms Green14.LRATKernelV2.checkKernel_sound
          #print axioms Green14.LRATImportSmoke.tinyCNF_unsat
          EOF
          set -o pipefail
          "$HOME/.elan/bin/lake" env lean "$RUNNER_TEMP/W320UpperAxioms.lean" \
            2>&1 | tee "$RUNNER_TEMP/w320-upper-axioms.log"
          ! grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' \
            "$RUNNER_TEMP/w320-upper-axioms.log"

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w320-upper-lrat-v2-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/w320-upper-build.log
            ${{ runner.temp }}/w320-upper-axioms.log
            ${{ runner.temp }}/w320-python-metadata.log
            ${{ runner.temp }}/w320-cnf-sha256.log
            ${{ runner.temp }}/w320-lean.cnf
