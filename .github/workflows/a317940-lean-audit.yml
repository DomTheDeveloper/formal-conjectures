name: A317940 Lean audit

on:
  push:
    branches:
      - a317940-lean-audit
  pull_request:
    branches:
      - a317940-lean-audit-base
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    name: Compile FormalConjectures.OEIS.317940
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit commit
        uses: actions/checkout@v6

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v1.4.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Get Mathlib cache
        run: |
          lake exe cache get

      - name: Compile A317940 module
        id: compile
        shell: bash
        run: |
          set +e
          lake --wfail build FormalConjectures.OEIS.317940 > a317940-build.log 2>&1
          status=$?
          cat a317940-build.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload Lean audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a317940-lean-audit-log
          path: a317940-build.log
          if-no-files-found: error
