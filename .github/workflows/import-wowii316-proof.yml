name: Import and verify complete WOWII 316 proof

# Trusted retrigger after the archived proof payload reached the branch.
on:
  push:
    branches:
      - merge/wowii316-full-proof
    paths:
      - '.github/workflows/import-wowii316-proof.yml'
      - 'WOWII/WotW316*.lean'
      - 'FormalConjectures/WrittenOnTheWallII/WotW316*.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture316.lean'
  pull_request:
    paths:
      - '.github/workflows/import-wowii316-proof.yml'
      - 'WOWII/WotW316*.lean'
      - 'FormalConjectures/WrittenOnTheWallII/WotW316*.lean'
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture316.lean'

permissions:
  contents: write

concurrency:
  group: wowii316-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Check out Formal Conjectures branch
        uses: actions/checkout@v6
        with:
          ref: merge/wowii316-full-proof

      - name: Check out pinned CRL proof archive
        uses: actions/checkout@v6
        with:
          repository: DomTheDeveloper/crl
          ref: 4505f2d40e1fa16c9d323e26d0e6e1506b8c0032
          path: crl-proof

      - name: Import proof modules into the FormalConjectures package
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          header = '''/-
          Copyright 2026 The Formal Conjectures Authors.

          Licensed under the Apache License, Version 2.0 (the "License");
          you may not use this file except in compliance with the License.
          You may obtain a copy of the License at

              https://www.apache.org/licenses/LICENSE-2.0

          Unless required by applicable law or agreed to in writing, software
          distributed under the License is distributed on an "AS IS" BASIS,
          WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          See the License for the specific language governing permissions and
          limitations under the License.
          -/'''

          source_dir = Path('crl-proof/proofs/lean/WotW316')
          target_dir = Path('FormalConjectures/WrittenOnTheWallII')
          target_dir.mkdir(parents=True, exist_ok=True)

          for source in sorted(source_dir.glob('WotW316*.lean')):
              text = source.read_text(encoding='utf-8')
              text = text.replace(
                  'import FormalConjectures.WrittenOnTheWallII.GraphConjecture316',
                  'import FormalConjectures.Util.ProblemImports')
              text = text.replace(
                  'import WotW316',
                  'import FormalConjectures.WrittenOnTheWallII.WotW316')
              if not text.startswith('/-\nCopyright '):
                  text = header + '\n\n' + text
              (target_dir / source.name).write_text(text, encoding='utf-8')

          stale_dir = Path('WOWII')
          for stale in stale_dir.glob('WotW316*.lean') if stale_dir.exists() else []:
              stale.unlink()

          catalog = target_dir / 'GraphConjecture316.lean'
          text = catalog.read_text(encoding='utf-8')
          text = text.replace('import WOWII.WotW316Final\n', '')
          wanted = 'import FormalConjectures.WrittenOnTheWallII.WotW316Final\n'
          if wanted not in text:
              text = text.replace(
                  'import FormalConjectures.Util.ProblemImports\n',
                  'import FormalConjectures.Util.ProblemImports\n' + wanted,
                  1)
          text = text.replace(
              '@[category research open, AMS 5]',
              '@[category research solved, AMS 5]',
              1)
          old = '''    IsWellTotallyDominated G := by
            sorry'''
          new = '''    IsWellTotallyDominated G := by
            exact conjecture316_solved G hG h'''
          if old in text:
              text = text.replace(old, new, 1)
          elif 'exact conjecture316_solved G hG h' not in text:
              raise SystemExit('Could not locate or verify the exact conjecture316 body')
          catalog.write_text(text, encoding='utf-8')
          PY

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A WOWII FormalConjectures/WrittenOnTheWallII
            git commit -m "Import package-native Lean proof of WOWII 316"
            git push origin HEAD:merge/wowii316-full-proof
          fi

      - name: Install Lean
        shell: bash
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y >/dev/null
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore Mathlib cache
        shell: bash
        run: lake exe cache get >/dev/null

      - name: Reject proof holes
        shell: bash
        run: |
          if grep -RInE '\b(sorry|admit)\b|^[[:space:]]*axiom[[:space:]]' \
              FormalConjectures/WrittenOnTheWallII/WotW316*.lean; then
            echo "Proof hole or custom axiom found"
            exit 1
          fi

      - name: Compile exact catalog theorem
        shell: bash
        run: lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture316

      - name: Audit exact theorem axioms
        shell: bash
        run: |
          cat > WOWII316FinalAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture316
          #check WrittenOnTheWallII.GraphConjecture316.conjecture316
          #print axioms WrittenOnTheWallII.GraphConjecture316.conjecture316
          EOF
          lake env lean WOWII316FinalAudit.lean 2>&1 | tee wowii316-final-audit.log
          if grep -E 'sorryAx|admitAx|Lean\.trustCompiler|Lean\.ofReduceBool' wowii316-final-audit.log; then
            echo "Unexpected non-kernel axiom detected"
            exit 1
          fi

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii316-final-audit
          path: wowii316-final-audit.log
          if-no-files-found: warn
