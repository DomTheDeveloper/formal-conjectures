name: A343881 current-upstream proof audit

on:
  pull_request:
    branches:
      - mirror/gdm-e751-proof-a343881
    paths:
      - 'FormalConjectures/OEIS/343881.lean'
      - 'AuditTriggers/A343881-current-upstream.md'

permissions:
  contents: read
  issues: write

concurrency:
  group: a343881-current-upstream-proof
  cancel-in-progress: true

jobs:
  lean:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Reject placeholders and trust shortcuts
        run: |
          if grep -nE '\b(sorry|admit|native_decide|unsafe)\b|(^|[^A-Za-z])axiom([^A-Za-z]|$)|Lean\.(trustCompiler|ofReduce|ofReduceBool)' FormalConjectures/OEIS/343881.lean; then
            exit 1
          fi
      - name: Compile exact proof
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          lake env lean -DwarningAsError=true FormalConjectures/OEIS/343881.lean \
            2>&1 | tee /tmp/a343881-compile.log
      - name: Report compiler diagnostic
        if: always()
        uses: actions/github-script@v7
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('/tmp/a343881-compile.log', 'utf8'); } catch (_) {}
            const excerpt = log.split(/\r?\n/).slice(-250).join('\n').slice(-55000);
            const passed = process.env.COMPILE_OUTCOME === 'success';
            const marker = '<!-- a343881-current-upstream-diagnostic -->';
            const body = [marker,
              `## A343881 current-upstream Lean audit: **${passed ? 'PASS' : 'FAIL'}**`,
              '', `Commit: \`${context.payload.pull_request.head.sha}\``, '',
              '```text', excerpt || '(no compiler output)', '```'].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100
            });
            const prior = comments.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prior.id, body});
            } else {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body});
            }
      - name: Audit theorem axioms
        if: steps.compile.outcome == 'success'
        run: |
          cat > /tmp/A343881Audit.lean <<'EOF'
          import FormalConjectures.OEIS.«343881»
          #print axioms OeisA343881.conjecture
          EOF
          lake env lean /tmp/A343881Audit.lean | tee /tmp/a343881-axioms.log
          ! grep -E 'sorryAx|Lean\.(trustCompiler|ofReduce|ofReduceBool)' /tmp/a343881-axioms.log
      - name: Enforce compiler result
        if: steps.compile.outcome != 'success'
        run: exit 1
