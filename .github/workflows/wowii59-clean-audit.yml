# Synchronization trigger for the current main-branch audit definition.

name: WOWII 59 clean proof audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'FormalConjectures/WrittenOnTheWallII/GraphConjecture59.lean'
      - '.github/workflows/wowii59-clean-audit.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wowii59-clean-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: false
      - name: Apply exact current-main repairs
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('FormalConjectures/WrittenOnTheWallII/GraphConjecture59.lean')
          text = path.read_text()

          if 'import Mathlib.Tactic' not in text:
              text = text.replace(
                  'import FormalConjecturesUtil\n',
                  'import FormalConjecturesUtil\nimport Mathlib.Tactic\n',
                  1,
              )

          text = text.replace(
              '  unfold residue\n  decide\n',
              '  unfold residue\n  bv_decide\n',
              1,
          )
          text = text.replace(
              '      counterColor u ≠ counterColor v := by\n  decide\n',
              '      counterColor u ≠ counterColor v := by\n  bv_decide\n',
              1,
          )

          old_app = '    have hineq := hP counterG counterG_connected'
          new_app = '    have hineq := hP (Fin 18) counterG counterG_connected'
          if old_app in text:
              text = text.replace(old_app, new_app)
          elif new_app not in text:
              raise SystemExit('could not locate the hP specialization')

          if text.count('bv_decide') != 2:
              raise SystemExit(f'expected exactly two bv_decide sites, found {text.count("bv_decide")}')
          path.write_text(text)
          PY
      - name: Reject proof holes and unsupported declarations
        shell: bash
        run: |
          set -euo pipefail
          file=FormalConjectures/WrittenOnTheWallII/GraphConjecture59.lean
          if grep -nE '(^|[^[:alnum:]_])(sorry|admit|native_decide)([^[:alnum:]_]|$)' "$file"; then
            exit 1
          fi
          if grep -nE '^[[:space:]]*(axiom|unsafe|opaque)([[:space:]]|$)' "$file"; then
            exit 1
          fi
      - name: Build exact module
        shell: bash
        run: |
          set -o pipefail
          lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture59 \
            2>&1 | tee wowii59-build.log
      - name: Audit final theorem axioms
        shell: bash
        run: |
          set -o pipefail
          cat > WOWII59AxiomAudit.lean <<'EOF'
          import FormalConjectures.WrittenOnTheWallII.GraphConjecture59

          /-! Focused axiom audit for the WOWII 59 counterexample theorem. -/

          #print axioms WrittenOnTheWallII.GraphConjecture59.conjecture59
          EOF
          lake env lean -DwarningAsError=true WOWII59AxiomAudit.lean \
            2>&1 | tee wowii59-axioms.log
          if grep -E 'sorryAx|Lean\.trustCompiler|Lean\.ofReduceBool|Lean\.ofReduce' wowii59-axioms.log; then
            exit 1
          fi
      - name: Persist verified source repairs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- FormalConjectures/WrittenOnTheWallII/GraphConjecture59.lean; then
            exit 0
          fi
          git config user.name 'ProofOrchestrator'
          git config user.email 'actions@users.noreply.github.com'
          git add FormalConjectures/WrittenOnTheWallII/GraphConjecture59.lean
          git commit -m 'Repair WOWII 59 tactic imports and theorem specialization'
          git push origin "HEAD:${HEAD_REF}"
      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii59-clean-audit-${{ github.sha }}
          path: |
            wowii59-build.log
            wowii59-axioms.log
            WOWII59AxiomAudit.lean
          if-no-files-found: warn
