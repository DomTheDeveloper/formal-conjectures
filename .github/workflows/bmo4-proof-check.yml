name: BMO4 proof check

on:
  push:
    branches:
      - solve-bmo4-no-sorry
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bmo4-proof-check
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: solve-bmo4-no-sorry
      - uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          build: false
      - name: Compile exact source theorem
        shell: bash
        run: lake env lean FormalConjectures/Other/BeaverMathOlympiad.lean
      - name: Audit exact BMO4 theorem axioms
        shell: bash
        run: |
          cat > BMO4AxiomAudit.lean <<'EOF'
          import FormalConjectures.Other.BeaverMathOlympiad
          #print axioms BeaverMathOlympiad.beaver_math_olympiad_problem_4
          EOF
          lake env lean BMO4AxiomAudit.lean | tee BMO4_AXIOMS.txt
          ! grep -q sorryAx BMO4_AXIOMS.txt
