name: BMO4 proof check

on:
  push:
    branches:
      - solve-bmo4-no-sorry
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: solve-bmo4-no-sorry
      - uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          build: false
      - name: Compile exact BMO4 proof
        shell: bash
        run: lake env lean FormalConjectures/Other/BMO4Proof.lean

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: solve-bmo4-no-sorry
      - uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          build: false
      - name: Compile exact BMO4 proof
        shell: pwsh
        run: lake env lean FormalConjectures/Other/BMO4Proof.lean
