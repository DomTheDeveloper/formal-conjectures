name: BMO4 proof check

on:
  push:
    branches:
      - solve-bmo4-no-sorry
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bmo4-proof-check
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: solve-bmo4-no-sorry
      - uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          build: false
      - name: Compile exact BMO4 theorem and audit axioms
        shell: bash
        run: lake env lean FormalConjectures/Other/BMO4Proof.lean
