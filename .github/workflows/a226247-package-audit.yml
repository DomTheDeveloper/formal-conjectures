name: A226247 package audit

on:
  push:
    branches:
      - audit/oeis-a226247-package-v3

permissions:
  contents: read
  statuses: write

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile A226247 package
        id: compile
        continue-on-error: true
        run: lake env lean -DwarningAsError=true FormalConjectures/OEIS/226247.lean
      - name: Publish audit status
        if: always()
        uses: actions/github-script@v7
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        with:
          script: |
            const passed = process.env.COMPILE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'A226247 package Lean audit',
              description: passed ? 'Current-upstream package compiled' : 'Package compilation failed'
            });
      - name: Enforce compiler result
        if: steps.compile.outcome != 'success'
        run: exit 1
