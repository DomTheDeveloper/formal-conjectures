name: Repair A261865 circle and reciprocal radical modules

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-4.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact compatibility repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              n = text.count(old)
              if n != 1:
                  raise SystemExit(f'{path}: expected one match, found {n}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          arc = 'FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean'
          replace_once(arc, 'Int.round (y - x)', 'round (y - x)')
          replace_once(arc, 'Int.round_le (y - x) z', 'round_le (y - x) z')
          replace_once(arc,
              '  have hfract := Int.fract_mem ((n : ℝ) * a)\n',
              '  have hfract : Int.fract ((n : ℝ) * a) ∈ Set.Ico (0 : ℝ) 1 :=\n'
              '    ⟨Int.fract_nonneg _, Int.fract_lt_one _⟩\n')
          replace_once(arc,
              '  rw [← ae_eq_empty]\n'
              '  filter_upwards [AddCircle.closedBall_ae_eq_ball\n'
              '    (x := (c : UnitAddCircle)) (ε := r)] with y hy\n'
              '  simp only [Set.mem_empty_iff_false, iff_false]\n'
              '  intro hysphere\n'
              '  have hclosed : y ∈ Metric.closedBall (c : UnitAddCircle) r :=\n'
              '    Metric.mem_closedBall.mpr (Metric.mem_sphere.mp hysphere).le\n'
              '  have hball : y ∈ Metric.ball (c : UnitAddCircle) r := by\n'
              '    rw [← hy]\n'
              '    exact hclosed\n'
              '  exact (Metric.mem_ball.mp hball).ne (Metric.mem_sphere.mp hysphere)\n',
              '  rw [← ae_eq_empty]\n'
              '  filter_upwards [AddCircle.closedBall_ae_eq_ball\n'
              '    (x := (c : UnitAddCircle)) (ε := r)] with y hy\n'
              '  constructor\n'
              '  · intro hysphere\n'
              '    have hclosed : y ∈ Metric.closedBall (c : UnitAddCircle) r :=\n'
              '      Metric.mem_closedBall.mpr (Metric.mem_sphere.mp hysphere).le\n'
              '    have hball : y ∈ Metric.ball (c : UnitAddCircle) r := hy.mp hclosed\n'
              '    exact (Metric.mem_ball.mp hball).ne (Metric.mem_sphere.mp hysphere)\n'
              '  · intro hyempty\n'
              '    exact hyempty.elim\n')

          radicals = 'FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean'
          replace_once(radicals,
              '  simp only [Pi.smul_apply\', Units.smul_def, u, Rat.smul_def]\n'
              '  rw [Rat.cast_inv, Rat.cast_natCast]\n'
              '  field_simp [hsqrt, Real.sq_sqrt hpos.le]\n',
              '  change 1 / Real.sqrt (s i) =\n'
              '    (((((s i : ℚ)⁻¹ : ℚ) : ℝ)) * Real.sqrt (s i))\n'
              '  rw [Rat.cast_inv, Rat.cast_natCast]\n'
              '  field_simp [hsqrt, Real.sq_sqrt hpos.le]\n')

          Path('.github/workflows/a261865-one-shot-repair-4.yml').unlink()
          PY

      - name: Commit repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/MeasureTheory/Group/UnitAddCircleArc.lean \
                  FormalConjecturesForMathlib/NumberTheory/SquarefreeRadicals.lean \
                  .github/workflows/a261865-one-shot-repair-4.yml
          git commit -m 'Fix A261865 circle and reciprocal radical compatibility'
          git push origin HEAD:a261865-research
