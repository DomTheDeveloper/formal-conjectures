name: Census WOWII Graph Conjecture 217

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  census:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install 'networkx==3.6.1'
      - run: python scripts/census_graph217.py
