name: Cancel stale PR 41 build

on:
  push:
    branches:
      - merge/wowii143-full-proof
    paths:
      - '.github/workflows/cancel-stale-pr41-build.yml'

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel obsolete full-site workflow run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/29784825594/cancel"
