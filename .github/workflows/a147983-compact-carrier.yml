name: OEIS A147983 compact carrier measurement

on:
  pull_request:
    branches: [main]
    paths:
      - 'ProofArtifacts/OEIS/A147983/chomp_export_p_ranks.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_p_mdd_serialize.cpp'
      - 'ProofArtifacts/OEIS/A147983/chomp_compact_carrier.cpp'
      - 'audits/a147983-compact-carrier/**'
      - '.github/workflows/a147983-compact-carrier.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a147983-compact-carrier-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Build exact generators
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set -euo pipefail
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_export_p_ranks.cpp -o chomp_export_p_ranks
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_p_mdd_serialize.cpp -o chomp_p_mdd_serialize
          g++ -std=c++17 -O3 -march=native -DNDEBUG -Wall -Wextra -Wpedantic \
            chomp_compact_carrier.cpp -o chomp_compact_carrier

      - name: Export exact P-position stream through third root
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/time -v ./chomp_export_p_ranks 10 42 p10x42.bin \
            > export.stdout 2> export.stderr
          grep -F 'P=107342138 prefixes=3042311754 last_rank=15820013305' export.stderr

      - name: Build serialized reduced P MDD
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/time -v ./chomp_p_mdd_serialize p10x42.bin p10x42.mdd \
            > mdd.stdout 2> mdd.stderr
          grep -F 'words=107342138 total_nodes=16906422 total_transitions=96754877' mdd.stdout

      - name: Measure high-area greedy carrier at 500k gate
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set +e
          /usr/bin/time -v ./chomp_compact_carrier p10x42.mdd 500000 high \
            > carrier-high.stdout 2> carrier-high.stderr
          status=$?
          set -e
          if [[ $status -ne 0 && $status -ne 3 ]]; then
            cat carrier-high.stderr >&2
            exit "$status"
          fi
          grep -E '^(COMPLETE|LIMIT) carrier=' carrier-high.stdout
          echo "$status" > carrier-high.status

      - name: Measure low-area greedy carrier at 500k gate
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          set +e
          /usr/bin/time -v ./chomp_compact_carrier p10x42.mdd 500000 low \
            > carrier-low.stdout 2> carrier-low.stderr
          status=$?
          set -e
          if [[ $status -ne 0 && $status -ne 3 ]]; then
            cat carrier-low.stderr >&2
            exit "$status"
          fi
          grep -E '^(COMPLETE|LIMIT) carrier=' carrier-low.stdout
          echo "$status" > carrier-low.status

      - name: Write compact report
        if: always()
        working-directory: ProofArtifacts/OEIS/A147983
        shell: bash
        run: |
          {
            echo '# OEIS A147983 compact closed-carrier measurement'
            echo
            echo '## High-area greedy carrier, 500000-node gate'
            cat carrier-high.stdout 2>/dev/null || true
            tail -n 80 carrier-high.stderr 2>/dev/null || true
            echo
            echo '## Low-area greedy carrier, 500000-node gate'
            cat carrier-low.stdout 2>/dev/null || true
            tail -n 80 carrier-low.stderr 2>/dev/null || true
          } > COMPACT_CARRIER_REPORT.md

      - name: Upload compact report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a147983-500k-compact-carrier-report
          path: |
            ProofArtifacts/OEIS/A147983/COMPACT_CARRIER_REPORT.md
            ProofArtifacts/OEIS/A147983/carrier-high.stdout
            ProofArtifacts/OEIS/A147983/carrier-high.stderr
            ProofArtifacts/OEIS/A147983/carrier-high.status
            ProofArtifacts/OEIS/A147983/carrier-low.stdout
            ProofArtifacts/OEIS/A147983/carrier-low.stderr
            ProofArtifacts/OEIS/A147983/carrier-low.status
          if-no-files-found: warn
