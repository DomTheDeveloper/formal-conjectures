name: W320 release obsolete runners

on:
  push:
    branches: [agent/w320-great-grandchildren]
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/w320-release-runners.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cancel-superseded-runs:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Cancel obsolete W320 runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The remaining masks 11, 14, and 25 have been exhaustively split.
          # Completed leaf artifacts from the first-level run are retained.
          for run_id in 30106990655 30110101155 30106774260; do
            code=$(curl -sS -o "response-${run_id}.txt" -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${REPOSITORY}/actions/runs/${run_id}/cancel")
            echo "run=${run_id} http=${code}"
            cat "response-${run_id}.txt" || true
            test "$code" = 202 -o "$code" = 409
          done
