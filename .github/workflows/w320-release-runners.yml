name: W320 release obsolete runners

on:
  push:
    branches: [agent/w320-great-grandchildren]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cancel-superseded-runs:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Cancel obsolete W320 runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          # 30106990655: first-level matrix; all non-hard leaves are complete,
          # and masks 11, 14, 25 have been exhaustively split on newer runs.
          # 30110101155: redundant inherited first-level matrix on the deep PR.
          # 30106774260: superseded monolithic solve.
          for run_id in 30106990655 30110101155 30106774260; do
            code=$(curl -sS -o "response-${run_id}.txt" -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${REPOSITORY}/actions/runs/${run_id}/cancel")
            echo "run=${run_id} http=${code}"
            cat "response-${run_id}.txt" || true
            # 202 = cancellation accepted; 409 = already completed/cancelled.
            test "$code" = 202 -o "$code" = 409
          done
