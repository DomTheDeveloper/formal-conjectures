name: Restricted-run final integrity

on:
  pull_request_target:
    branches: [main]
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lean:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'proof/restricted-run-tableaux-reduction' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Build final restricted-run targets
        id: compile
        shell: bash
        run: |
          set +e
          lake build \
            FormalConjecturesForMathlib.Combinatorics.RestrictedRunTableaux \
            FormalConjecturesForMathlib.Combinatorics.RestrictedRunTableauxReduction \
            FormalConjectures.Arxiv.RestrictedRunTableaux \
            2>&1 | tee restricted-final.log
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"
      - name: Report final integrity result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- restricted-final-integrity -->';
            const raw = fs.existsSync('restricted-final.log')
              ? fs.readFileSync('restricted-final.log', 'utf8')
              : 'No log was produced.';
            const tail = raw.split('\n').slice(-180).join('\n');
            const status = '${{ steps.compile.outputs.code }}' === '0' ? 'PASS' : 'FAIL';
            const sha = context.payload.pull_request.head.sha;
            const body = `${marker}\n### Restricted-run final integrity: ${status}\n\nHead: \`${sha}\`\n\n\`\`\`text\n${tail}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const previous = comments.find(c => c.body && c.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
