name: Restricted-run tableaux audit

on:
  pull_request:
    branches: [main]
    paths:
      - FormalConjectures/Arxiv/RestrictedRunTableaux.lean
      - FormalConjecturesForMathlib.lean
      - FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableaux.lean

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Run Lean audit
        run: |
          set +e
          lake build FormalConjecturesForMathlib.Combinatorics.RestrictedRunTableaux > definitions.log 2>&1
          definitions_code=$?
          lake build FormalConjectures.Arxiv.RestrictedRunTableaux > conjecture.log 2>&1
          conjecture_code=$?
          lake build FormalConjecturesForMathlib > indexed.log 2>&1
          indexed_code=$?
          echo "$definitions_code $conjecture_code $indexed_code" > exit-codes.txt
          exit 0
      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restricted-run-tableaux-audit-logs
          path: |
            definitions.log
            conjecture.log
            indexed.log
            exit-codes.txt
      - name: Enforce audit result
        if: always()
        run: |
          read definitions_code conjecture_code indexed_code < exit-codes.txt
          test "$definitions_code" = "0"
          test "$conjecture_code" = "0"
          test "$indexed_code" = "0"
