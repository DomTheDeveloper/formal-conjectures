name: Restricted-run tableaux audit

on:
  pull_request:
    branches: [main]
    paths:
      - FormalConjectures/Arxiv/RestrictedRunTableaux.lean
      - FormalConjecturesForMathlib.lean
      - FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableaux.lean

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile definitions
        run: lake env lean FormalConjecturesForMathlib/Combinatorics/RestrictedRunTableaux.lean
      - name: Compile conjecture
        run: lake env lean FormalConjectures/Arxiv/RestrictedRunTableaux.lean
      - name: Build indexed helper library
        run: lake build FormalConjecturesForMathlib
