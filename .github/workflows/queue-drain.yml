name: Drain obsolete Actions runs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/queue-drain.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  drain:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Cancel obsolete runs
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_SHA: 9d64798baf3c9d145cedc30f6327c5432f67b3c9
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          current_run = int(os.environ["GITHUB_RUN_ID"])
          keep_sha = os.environ["KEEP_SHA"]
          api = "https://api.github.com"

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "formal-conjectures-queue-drain",
          }

          def request_json(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def cancel(run_id: int):
              url = f"{api}/repos/{repo}/actions/runs/{run_id}/cancel"
              request = urllib.request.Request(
                  url, data=b"", headers=headers, method="POST"
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      print(f"cancel {run_id}: HTTP {response.status}")
              except urllib.error.HTTPError as error:
                  if error.code in (409, 422):
                      print(f"cancel {run_id}: already finished or not cancellable ({error.code})")
                  else:
                      raise

          candidates = {}
          for status in ("in_progress", "queued", "pending", "waiting"):
              url = (
                  f"{api}/repos/{repo}/actions/runs"
                  f"?status={status}&per_page=100"
              )
              for run in request_json(url).get("workflow_runs", []):
                  candidates[run["id"]] = run

          selected = []
          for run in candidates.values():
              run_id = run["id"]
              if run_id == current_run:
                  continue

              workflow_id = run.get("workflow_id")
              head_sha = run.get("head_sha")
              head_branch = run.get("head_branch")

              # Cancel every old full-project/docs run. Preserve only the first
              # hardened main commit so the new workflow can validate itself.
              old_docs_run = workflow_id == 313858789 and head_sha != keep_sha

              # PR #95 was a disposable checker and is now closed.
              closed_checker = head_branch == "bmo8-slim-audit"

              if old_docs_run or closed_checker:
                  selected.append(run)

          selected.sort(key=lambda run: run.get("created_at", ""))
          print(f"selected {len(selected)} obsolete run(s)")
          for run in selected:
              print(
                  run["id"],
                  run.get("status"),
                  run.get("name"),
                  run.get("head_branch"),
                  run.get("head_sha"),
              )
              cancel(run["id"])
          PY
