name: Geode5 arithmetic bridge audit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  arithmetic-layers:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit-geode5-arithmetic-proof'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 arithmetic proof layers
        id: compile
        shell: bash
        run: |
          set -uo pipefail
          root=FormalConjectures/Arxiv/2508.10245/Geode5Proof
          out=.lake/build/lib/lean/FormalConjectures/Arxiv/2508.10245/Geode5Proof
          mkdir -p "$out"
          test -z "$(grep -RInE '\b(sorry|admit)\b' "$root" || true)"
          modules=(Reduction IntegralityReduction MultinomialDivisibility HyperCatalanIntegrality CastBridges)
          set +e
          status=0
          : > geode5-arithmetic.log
          for module in "${modules[@]}"; do
            echo "===== $module =====" | tee -a geode5-arithmetic.log
            lake env lean -DwarningAsError=true \
              "$root/$module.lean" -o "$out/$module.olean" \
              2>&1 | tee -a geode5-arithmetic.log
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then break; fi
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geode5-arithmetic-diagnostics-${{ github.run_id }}
          path: geode5-arithmetic.log
          if-no-files-found: error
      - name: Enforce compiler result
        if: always()
        shell: bash
        run: exit "${{ steps.compile.outputs.status || '1' }}"
