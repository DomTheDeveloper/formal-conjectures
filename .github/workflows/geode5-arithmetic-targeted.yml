name: Geode5 arithmetic bridge audit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  arithmetic-layers:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit-geode5-arithmetic-proof'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
      - name: Compile Geode5 arithmetic proof layers
        id: compile
        shell: bash
        run: |
          set -uo pipefail
          arxiv=FormalConjectures/Arxiv/2508.10245
          root=$arxiv/Geode5Proof
          lib=.lake/build/lib/lean
          outBase=$lib/FormalConjectures/Arxiv/2508.10245
          out=$outBase/Geode5Proof
          mkdir -p "$out"
          test -z "$(grep -RInE '\b(sorry|admit)\b' "$root" || true)"
          set +e
          status=0
          : > geode5-arithmetic.log
          echo "===== FormalConjecturesUtil dependency =====" | tee -a geode5-arithmetic.log
          lake env lean -DwarningAsError=true \
            FormalConjecturesUtil.lean -o "$lib/FormalConjecturesUtil.olean" \
            2>&1 | tee -a geode5-arithmetic.log
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 0 ]; then
            echo "===== Geode5 benchmark dependency =====" | tee -a geode5-arithmetic.log
            lake env lean -DwarningAsError=true \
              "$arxiv/Geode5.lean" -o "$outBase/Geode5.olean" \
              2>&1 | tee -a geode5-arithmetic.log
            status=${PIPESTATUS[0]}
          fi
          modules=(Reduction IntegralityReduction MultinomialDivisibility HyperCatalanIntegrality CastBridges)
          if [ "$status" -eq 0 ]; then
            for module in "${modules[@]}"; do
              echo "===== $module =====" | tee -a geode5-arithmetic.log
              lake env lean -DwarningAsError=true \
                "$root/$module.lean" -o "$out/$module.olean" \
                2>&1 | tee -a geode5-arithmetic.log
              status=${PIPESTATUS[0]}
              if [ "$status" -ne 0 ]; then break; fi
            done
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geode5-arithmetic-diagnostics-${{ github.run_id }}
          path: geode5-arithmetic.log
          if-no-files-found: error
      - name: Enforce compiler result
        if: always()
        shell: bash
        run: exit "${{ steps.compile.outputs.status || '1' }}"
