name: W320 kernel audit

on:
  push:
    branches:
      - agent/w320-kernel-proof
    paths:
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/w320-kernel-audit.yml'
  pull_request:
    paths:
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/w320-kernel-audit.yml'

permissions:
  contents: read

concurrency:
  group: w320-kernel-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Build W(3,20) proof
        run: lake build FormalConjectures.GreensOpenProblems.Green14FastKernel20
      - name: Audit theorem axioms
        shell: bash
        run: |
          cat > /tmp/W320Axioms.lean <<'EOF'
          import FormalConjectures.GreensOpenProblems.Green14FastKernel20
          #print axioms Green14.FastKernel.valid_20
          #print axioms Green14.FastKernel.W_3_20_lower_fast
          EOF
          lake env lean /tmp/W320Axioms.lean 2>&1 | tee w320-axioms.log
          if grep -E 'sorryAx|Lean\.ofReduceBool|Lean\.trustCompiler' w320-axioms.log; then
            exit 1
          fi
