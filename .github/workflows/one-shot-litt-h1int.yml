name: One-shot Litt subtraction repair

on:
  push:
    paths:
      - '.github/workflows/one-shot-litt-h1int.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/litt-most-unfair-proof
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace brittle natural subtraction proof
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointConstant.lean')
          text = p.read_text()
          old = '  have h1int : 1 < n - 1 := by omega\n'
          new = '  have h1int : 1 < n - 1 := Nat.lt_sub_of_add_lt (by omega)\n'
          if old not in text:
              raise SystemExit('target line not found')
          p.write_text(text.replace(old, new, 1))
          PY
          git config user.name 'ProofOrchestrator'
          git config user.email 'actions@users.noreply.github.com'
          git add FormalConjectures/Other/LittMostUnfairBetWalshTwoEndpointConstant.lean
          git commit -m 'Fix Litt constant-interior subtraction bound'
          git push origin HEAD:agent/litt-most-unfair-proof
