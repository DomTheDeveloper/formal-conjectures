name: Green14 Windows certificate audit

on:
  push:
    branches:
      - agent/green14-certificates-20-39
    paths:
      - 'FormalConjectures/GreensOpenProblems/14.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/green14-windows-audit.yml'
  pull_request:
    paths:
      - 'FormalConjectures/GreensOpenProblems/14.lean'
      - 'FormalConjectures/GreensOpenProblems/Green14*.lean'
      - '.github/workflows/green14-windows-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: green14-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Lean
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/leanprover/elan/master/elan-init.ps1 -OutFile elan-init.ps1
          & powershell -ExecutionPolicy Bypass -File .\elan-init.ps1 -y --default-toolchain none
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Fetch Mathlib cache
        shell: pwsh
        run: |
          lake exe cache get
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compile complete bridge and exact catalog
        shell: pwsh
        run: |
          $files = @(
            'FormalConjectures/GreensOpenProblems/Green14Core.lean',
            'FormalConjectures/GreensOpenProblems/Green14FiniteExistence.lean',
            'FormalConjectures/GreensOpenProblems/Green14OrderBridge.lean',
            'FormalConjectures/GreensOpenProblems/Green14Certificates.lean',
            'FormalConjectures/GreensOpenProblems/Green14CertificateBridge.lean',
            'FormalConjectures/GreensOpenProblems/14.lean'
          )
          New-Item -ItemType File -Force green14-windows.log | Out-Null
          foreach ($file in $files) {
            "=== Checking $file ===" | Tee-Object -FilePath green14-windows.log -Append
            lake env lean $file 2>&1 | Tee-Object -FilePath green14-windows.log -Append
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Audit exact catalog theorem axioms
        shell: pwsh
        run: |
          @'
          import FormalConjectures.GreensOpenProblems.«14»
          #print axioms Green14.W_3_20_lower
          #print axioms Green14.W_3_39_lower
          '@ | Set-Content -Encoding utf8 Green14WindowsAxioms.lean
          lake env lean Green14WindowsAxioms.lean 2>&1 | Tee-Object -FilePath green14-windows.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (Select-String -Path green14-windows.log -Pattern 'sorryAx') { exit 1 }

      - name: Upload transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: green14-windows-audit
          path: green14-windows.log
          if-no-files-found: warn
