name: Close final A261865 support-module mismatch

on:
  push:
    branches: [a261865-research]
    paths:
      - '.github/workflows/a261865-one-shot-repair-7.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a261865-research
          fetch-depth: 0

      - name: Apply exact Lean repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean')
          text = path.read_text()
          old = (
              '  rw [integral_map hY.aemeasurable f.continuous.aestronglyMeasurable]\n'
              '  have hfint : Integrable (fun n => f (Y n)) p.toMeasure := by\n'
          )
          new = (
              '  rw [integral_map hY.aemeasurable f.continuous.aestronglyMeasurable]\n'
              '  change (∫ n : ℕ, f (Y n) ∂p.toMeasure) = _\n'
              '  have hfint : Integrable (fun n => f (Y n)) p.toMeasure := by\n'
          )
          if text.count(old) != 1:
              raise SystemExit(f'expected one match, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/a261865-one-shot-repair-7.yml').unlink()
          PY

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ProofOrchestrator'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FormalConjecturesForMathlib/MeasureTheory/Probability/Empirical.lean \
                  .github/workflows/a261865-one-shot-repair-7.yml
          git commit -m 'Close final A261865 empirical measure mismatch'
          git push origin HEAD:a261865-research
